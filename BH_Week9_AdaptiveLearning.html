borne equips students to read the formal architecture of narrative and poetry. Its tools include narrator, implied reader, plot, point of view, genre, parallelism, and intertextual citation.</p>\n  <div class=\"callout\"><strong>Use this instrument when asking:</strong> How does this text's form position the reader and perform its meaning?</div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>악기로서의 Osborne</h2>\n  <p>Osborne은 학생들이 내러티브와 시의 형식 아키텍처를 읽도록 돕습니다. 주요 도구는 화자, 암시된 독자, 플롯, 관점, 장르, 평행법, 상호본문적 인용입니다.</p>\n  <div class=\"callout\"><strong>이 악기를 사용할 질문:</strong> 이 본문의 형식은 독자를 어떻게 위치시키고 의미를 어떻게 수행하는가?</div>\n</div>\n"}, {"id": "both", "label_en": "Both Together", "label_ko": "둘을 함께", "en": "\n<div class=\"card\">\n  <h2>Integrated reading practice</h2>\n  <p>Do not sequence the methods mechanically. Practice simultaneous attention: community situation, textual form, implied reader, actual reader, proclamation, and presence.</p>\n  <table>\n    <tr><th>Reading layer</th><th>Diagnostic question</th></tr>\n    <tr><td>Community</td><td>Who needed this text and why?</td></tr>\n    <tr><td>Form</td><td>How does the text's shape produce meaning?</td></tr>\n    <tr><td>Reader</td><td>Where does the text place its implied reader?</td></tr>\n    <tr><td>Actual WHERE</td><td>Where am I / are we reading from?</td></tr>\n    <tr><td>Practice</td><td>What changes when proclamation and presence are held together?</td></tr>\n  </table>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>통합 읽기 실천</h2>\n  <p>두 방법을 기계적으로 순서화하지 마십시오. 공동체 상황, 본문 형식, 암시된 독자, 실제 독자, 선포, 임재를 동시에 주목하십시오.</p>\n  <table>\n    <tr><th>읽기 층위</th><th>진단 질문</th></tr>\n    <tr><td>공동체</td><td>누가 이 본문을 필요로 했으며 왜 필요한가?</td></tr>\n    <tr><td>형식</td><td>본문의 형태는 어떻게 의미를 생산하는가?</td></tr>\n    <tr><td>독자</td><td>본문은 암시된 독자를 어디에 위치시키는가?</td></tr>\n    <tr><td>실제 WHERE</td><td>나는 / 우리는 어디에서 읽고 있는가?</td></tr>\n    <tr><td>실천</td><td>선포와 임재를 함께 붙들 때 무엇이 달라지는가?</td></tr>\n  </table>\n</div>\n"}]}, {"id": "guided", "label_en": "Guided Reading", "label_ko": "안내 읽기", "subtabs": [{"id": "before", "label_en": "Before Reading", "label_ko": "읽기 전", "en": "\n<div class=\"card\">\n  <h2>Before reading</h2>\n  <ol>\n    <li>Write one sentence defining “form carries meaning.”</li>\n    <li>List one strength and one risk of Fee & Stuart's approach.</li>\n    <li>List one strength and one risk of Osborne's approach.</li>\n    <li>Name the audience or community you instinctively imagine when reading Luke 15.</li>\n  </ol>\n  <label class=\"note-label\" for=\"noteB\">Pre-reading note</label>\n  <textarea id=\"noteB\" placeholder=\"Write your pre-reading observations...\"></textarea>\n  <div class=\"btn-row\"><button class=\"btn\" onclick=\"saveNotes()\">Save notes</button><button class=\"btn\" onclick=\"clearNotes()\">Clear notes</button></div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>읽기 전</h2>\n  <ol>\n    <li>“형식은 의미를 운반한다”를 한 문장으로 정의하십시오.</li>\n    <li>Fee & Stuart 접근의 강점 하나와 위험 하나를 적으십시오.</li>\n    <li>Osborne 접근의 강점 하나와 위험 하나를 적으십시오.</li>\n    <li>누가복음 15장을 읽을 때 본능적으로 떠올리는 청중 또는 공동체를 이름 붙이십시오.</li>\n  </ol>\n  <label class=\"note-label\" for=\"noteB\">읽기 전 노트</label>\n  <textarea id=\"noteB\" placeholder=\"읽기 전 관찰을 작성하세요...\"></textarea>\n  <div class=\"btn-row\"><button class=\"btn\" onclick=\"saveNotes()\">노트 저장</button><button class=\"btn\" onclick=\"clearNotes()\">노트 지우기</button></div>\n</div>\n"}, {"id": "during", "label_en": "During Reading", "label_ko": "읽는 중", "en": "\n<div class=\"card\">\n  <h2>During reading</h2>\n  <ul>\n    <li>Underline every sentence that describes the reader's WHERE.</li>\n    <li>Circle every contrast between proclamation and presence.</li>\n    <li>Mark every place where the manuscript says the two methods are not enough by themselves.</li>\n    <li>Write one question that you would bring to small group discussion.</li>\n  </ul>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>읽는 중</h2>\n  <ul>\n    <li>독자의 WHERE를 설명하는 모든 문장에 밑줄을 그으십시오.</li>\n    <li>선포와 임재의 대조가 나오는 모든 곳에 표시하십시오.</li>\n    <li>두 방법이 그 자체만으로 충분하지 않다고 말하는 모든 지점을 표시하십시오.</li>\n    <li>소그룹 토론에 가져갈 질문 하나를 작성하십시오.</li>\n  </ul>\n</div>\n"}, {"id": "after", "label_en": "After Reading", "label_ko": "읽은 후", "en": "\n<div class=\"card\">\n  <h2>After reading</h2>\n  <p>Complete this sentence:</p>\n  <div class=\"callout\">After Week 9, I can no longer read Gospel texts merely as ______; I must now read them as ______.</div>\n  <label class=\"note-label\" for=\"noteC\">Final reflection</label>\n  <textarea id=\"noteC\" placeholder=\"Complete the sentence and explain your answer...\"></textarea>\n  <div class=\"btn-row\"><button class=\"btn\" onclick=\"saveNotes()\">Save notes</button><button class=\"btn\" onclick=\"clearNotes()\">Clear notes</button></div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>읽은 후</h2>\n  <p>다음 문장을 완성하십시오.</p>\n  <div class=\"callout\">9주차 이후 나는 복음서 본문을 더 이상 단순히 ______으로 읽을 수 없다. 이제 나는 그것을 ______으로 읽어야 한다.</div>\n  <label class=\"note-label\" for=\"noteC\">최종 성찰</label>\n  <textarea id=\"noteC\" placeholder=\"문장을 완성하고 답을 설명하세요...\"></textarea>\n  <div class=\"btn-row\"><button class=\"btn\" onclick=\"saveNotes()\">노트 저장</button><button class=\"btn\" onclick=\"clearNotes()\">노트 지우기</button></div>\n</div>\n"}]}, {"id": "glossary", "label_en": "Glossary", "label_ko": "용어집", "subtabs": [{"id": "terms", "label_en": "Key Terms", "label_ko": "핵심 용어", "en": "\n<div class=\"card\">\n  <h2>Key terms</h2>\n  <div class=\"mini-grid\">\n    <div class=\"mini\"><span>Form carries meaning</span><strong>The text's structure performs interpretation.</strong></div>\n    <div class=\"mini\"><span>Two-level method</span><strong>Jesus' historical setting and the evangelist's ecclesial shaping.</strong></div>\n    <div class=\"mini\"><span>Implied reader</span><strong>The reader-position produced by the text.</strong></div>\n    <div class=\"mini\"><span>Already / not yet</span><strong>Eschatological tension as communal and existential condition.</strong></div>\n    <div class=\"mini\"><span>Proclamation-logic</span><strong>The kingdom announces and reshapes belonging.</strong></div>\n    <div class=\"mini\"><span>Presence-logic</span><strong>Lament is inhabited before resolution.</strong></div>\n    <div class=\"mini\"><span>Reader's WHERE</span><strong>The actual reader's situatedness before the text.</strong></div>\n    <div class=\"mini\"><span>Topological reading</span><strong>Holding multiple relational fields simultaneously.</strong></div>\n  </div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>핵심 용어</h2>\n  <div class=\"mini-grid\">\n    <div class=\"mini\"><span>형식은 의미를 운반한다</span><strong>본문의 구조가 해석을 수행한다.</strong></div>\n    <div class=\"mini\"><span>두 수준 방법</span><strong>예수의 역사적 자리와 복음서 저자의 교회적 형성.</strong></div>\n    <div class=\"mini\"><span>암시된 독자</span><strong>본문이 만들어 내는 독자 위치.</strong></div>\n    <div class=\"mini\"><span>Already / not yet</span><strong>공동체적이고 실존적인 조건으로서의 종말론적 긴장.</strong></div>\n    <div class=\"mini\"><span>선포의 논리</span><strong>하나님 나라가 선포하며 소속을 재형성한다.</strong></div>\n    <div class=\"mini\"><span>임재의 논리</span><strong>탄식은 해결 전에 거주된다.</strong></div>\n    <div class=\"mini\"><span>독자의 WHERE</span><strong>본문 앞에서 실제 독자가 놓인 위치성.</strong></div>\n    <div class=\"mini\"><span>위상학적 읽기</span><strong>여러 관계적 장을 동시에 붙드는 읽기.</strong></div>\n  </div>\n</div>\n"}]}, {"id": "notes", "label_en": "Notes / Reflection", "label_ko": "노트 / 성찰", "subtabs": [{"id": "notes", "label_en": "Saved Notes", "label_ko": "저장 노트", "en": "\n<div class=\"card\">\n  <h2>Notes / Reflection</h2>\n  <p>Use these fields for personal preparation. Notes save locally in this browser.</p>\n  <label class=\"note-label\" for=\"noteA\">1. Integrated synthesis statement</label>\n  <textarea id=\"noteA\" placeholder=\"In this text, Fee & Stuart helps me see...\"></textarea>\n  <label class=\"note-label\" for=\"noteB\">2. Reader's WHERE diagnostic</label>\n  <textarea id=\"noteB\" placeholder=\"Where am I / are we reading from?\"></textarea>\n  <label class=\"note-label\" for=\"noteC\">3. Proclamation + presence practice</label>\n  <textarea id=\"noteC\" placeholder=\"What would change in teaching, preaching, or discussion?\"></textarea>\n  <div class=\"btn-row\"><button class=\"btn\" onclick=\"saveNotes()\">Save notes</button><button class=\"btn\" onclick=\"clearNotes()\">Clear notes</button></div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>노트 / 성찰</h2>\n  <p>개인 예습을 위해 사용하십시오. 노트는 이 브라우저에 로컬 저장됩니다.</p>\n  <label class=\"note-label\" for=\"noteA\">1. 통합 종합 진술문</label>\n  <textarea id=\"noteA\" placeholder=\"이 본문에서 Fee & Stuart는 나에게...\"></textarea>\n  <label class=\"note-label\" for=\"noteB\">2. 독자의 WHERE 진단</label>\n  <textarea id=\"noteB\" placeholder=\"나는 / 우리는 어디에서 읽고 있는가?\"></textarea>\n  <label class=\"note-label\" for=\"noteC\">3. 선포 + 임재 실천</label>\n  <textarea id=\"noteC\" placeholder=\"가르침, 설교, 토론에서 무엇이 달라져야 하는가?\"></textarea>\n  <div class=\"btn-row\"><button class=\"btn\" onclick=\"saveNotes()\">노트 저장</button><button class=\"btn\" onclick=\"clearNotes()\">노트 지우기</button></div>\n</div>\n"}]}, {"id": "quiz", "label_en": "Quiz", "label_ko": "퀴즈", "subtabs": [{"id": "quiz", "label_en": "7 MCQ", "label_ko": "7 객관식", "en": "<div class=\"card\"><h2>Self-Assessment Quiz</h2><div class=\"quiz-item\"><h3>1. What is the shared hermeneutical claim of the two manuscripts?</h3><button class=\"opt\" data-correct=\"false\" data-exp=\"The synthesis states that biblical form is not a disposable container; it is part of the theological argument.\" onclick=\"showAnswer(this)\">Historical context can be ignored when applying Scripture.</button><button class=\"opt\" data-correct=\"true\" data-exp=\"The synthesis states that biblical form is not a disposable container; it is part of the theological argument.\" onclick=\"showAnswer(this)\">Form carries meaning and performs theological argument.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"The synthesis states that biblical form is not a disposable container; it is part of the theological argument.\" onclick=\"showAnswer(this)\">Only doctrinal summaries are reliable.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"The synthesis states that biblical form is not a disposable container; it is part of the theological argument.\" onclick=\"showAnswer(this)\">Narrative is less theological than epistles.</button><div class=\"answer\"></div></div><div class=\"quiz-item\"><h3>2. How do Fee &amp; Stuart and Osborne differ methodologically?</h3><button class=\"opt\" data-correct=\"true\" data-exp=\"Fee &amp; Stuart emphasize the Gospel&#x27;s community situation; Osborne emphasizes the text&#x27;s formal mechanics and implied reader.\" onclick=\"showAnswer(this)\">Fee &amp; Stuart move community to text; Osborne moves text to reader.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"Fee &amp; Stuart emphasize the Gospel&#x27;s community situation; Osborne emphasizes the text&#x27;s formal mechanics and implied reader.\" onclick=\"showAnswer(this)\">Both begin with modern reader response only.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"Fee &amp; Stuart emphasize the Gospel&#x27;s community situation; Osborne emphasizes the text&#x27;s formal mechanics and implied reader.\" onclick=\"showAnswer(this)\">Osborne rejects literary form; Fee &amp; Stuart reject community context.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"Fee &amp; Stuart emphasize the Gospel&#x27;s community situation; Osborne emphasizes the text&#x27;s formal mechanics and implied reader.\" onclick=\"showAnswer(this)\">Both treat the Gospels as systematic manuals.</button><div class=\"answer\"></div></div><div class=\"quiz-item\"><h3>3. What does &#x27;already/not yet&#x27; name in the integrated lecture?</h3><button class=\"opt\" data-correct=\"false\" data-exp=\"The synthesis maps the same eschatological tension onto both communal formation and lament form.\" onclick=\"showAnswer(this)\">Only a timeline of end-times prediction.</button><button class=\"opt\" data-correct=\"true\" data-exp=\"The synthesis maps the same eschatological tension onto both communal formation and lament form.\" onclick=\"showAnswer(this)\">A reader&#x27;s communal condition and the lament&#x27;s structural tension.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"The synthesis maps the same eschatological tension onto both communal formation and lament form.\" onclick=\"showAnswer(this)\">A reason to skip historical study.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"The synthesis maps the same eschatological tension onto both communal formation and lament form.\" onclick=\"showAnswer(this)\">A contradiction between Fee and Osborne.</button><div class=\"answer\"></div></div><div class=\"quiz-item\"><h3>4. What is the method boundary both manuscripts leave open?</h3><button class=\"opt\" data-correct=\"false\" data-exp=\"Both methods leave the actual reader&#x27;s situatedness outside the method; the 7-WHERE supplement names this field.\" onclick=\"showAnswer(this)\">The date of Mark&#x27;s Gospel.</button><button class=\"opt\" data-correct=\"true\" data-exp=\"Both methods leave the actual reader&#x27;s situatedness outside the method; the 7-WHERE supplement names this field.\" onclick=\"showAnswer(this)\">The reader&#x27;s actual WHERE.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"Both methods leave the actual reader&#x27;s situatedness outside the method; the 7-WHERE supplement names this field.\" onclick=\"showAnswer(this)\">The number of parables in Luke.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"Both methods leave the actual reader&#x27;s situatedness outside the method; the 7-WHERE supplement names this field.\" onclick=\"showAnswer(this)\">The grammar of Hebrew poetry only.</button><div class=\"answer\"></div></div><div class=\"quiz-item\"><h3>5. What is the integrated claim of Part 3?</h3><button class=\"opt\" data-correct=\"false\" data-exp=\"The source says the integrated reading needs both how the text works and whom/what-for it addresses.\" onclick=\"showAnswer(this)\">Use Fee first, then discard Osborne.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"The source says the integrated reading needs both how the text works and whom/what-for it addresses.\" onclick=\"showAnswer(this)\">Use Osborne only for poetry.</button><button class=\"opt\" data-correct=\"true\" data-exp=\"The source says the integrated reading needs both how the text works and whom/what-for it addresses.\" onclick=\"showAnswer(this)\">Responsible Gospel hermeneutics requires both instruments simultaneously.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"The source says the integrated reading needs both how the text works and whom/what-for it addresses.\" onclick=\"showAnswer(this)\">Integration means reducing both methods to one rule.</button><div class=\"answer\"></div></div><div class=\"quiz-item\"><h3>6. What pastoral contrast does the synthesis name?</h3><button class=\"opt\" data-correct=\"false\" data-exp=\"Fee &amp; Stuart emphasize proclamation of the kingdom; Osborne emphasizes inhabiting lament without rushing resolution.\" onclick=\"showAnswer(this)\">Law vs. history.</button><button class=\"opt\" data-correct=\"true\" data-exp=\"Fee &amp; Stuart emphasize proclamation of the kingdom; Osborne emphasizes inhabiting lament without rushing resolution.\" onclick=\"showAnswer(this)\">Proclamation-logic vs. presence-logic.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"Fee &amp; Stuart emphasize proclamation of the kingdom; Osborne emphasizes inhabiting lament without rushing resolution.\" onclick=\"showAnswer(this)\">Greek vs. Hebrew.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"Fee &amp; Stuart emphasize proclamation of the kingdom; Osborne emphasizes inhabiting lament without rushing resolution.\" onclick=\"showAnswer(this)\">Doctrine vs. grammar.</button><div class=\"answer\"></div></div><div class=\"quiz-item\"><h3>7. What should students be unable to return to after this week?</h3><button class=\"opt\" data-correct=\"false\" data-exp=\"Formation permanence means students can no longer responsibly read with only one instrument or bypass form.\" onclick=\"showAnswer(this)\">Careful reading.</button><button class=\"opt\" data-correct=\"true\" data-exp=\"Formation permanence means students can no longer responsibly read with only one instrument or bypass form.\" onclick=\"showAnswer(this)\">Single-instrument interpretation and form-bypassing extraction.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"Formation permanence means students can no longer responsibly read with only one instrument or bypass form.\" onclick=\"showAnswer(this)\">Bilingual study.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"Formation permanence means students can no longer responsibly read with only one instrument or bypass form.\" onclick=\"showAnswer(this)\">Historical context.</button><div class=\"answer\"></div></div></div>", "ko": "<div class=\"card\"><h2>자가 점검 퀴즈</h2><div class=\"quiz-item\"><h3>1. 두 원고가 공유하는 핵심 해석학적 주장은 무엇인가?</h3><button class=\"opt\" data-correct=\"false\" data-exp=\"종합 원고는 성경 본문의 형식이 단순한 용기가 아니라 신학적 논증 자체의 일부라고 말합니다.\" onclick=\"showAnswer(this)\">역사적 맥락은 적용할 때 무시해도 된다.</button><button class=\"opt\" data-correct=\"true\" data-exp=\"종합 원고는 성경 본문의 형식이 단순한 용기가 아니라 신학적 논증 자체의 일부라고 말합니다.\" onclick=\"showAnswer(this)\">형식은 의미를 운반하며 신학적 논증을 수행한다.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"종합 원고는 성경 본문의 형식이 단순한 용기가 아니라 신학적 논증 자체의 일부라고 말합니다.\" onclick=\"showAnswer(this)\">교리적 요약만 신뢰할 수 있다.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"종합 원고는 성경 본문의 형식이 단순한 용기가 아니라 신학적 논증 자체의 일부라고 말합니다.\" onclick=\"showAnswer(this)\">내러티브는 서신보다 신학적이지 않다.</button><div class=\"answer\"></div></div> 방법 밖에 남기며, 7-WHERE 보충이 이 장을 이름 붙입니다.\" onclick=\"showAnswer(this)\">실제 독자의 WHERE.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"두 방법 모두 실제 독자의 위치성을 방법 밖에 남기며, 7-WHERE 보충이 이 장을 이름 붙입니다.\" onclick=\"showAnswer(this)\">누가복음의 비유 개수.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"두 방법 모두 실제 독자의 위치성을 방법 밖에 남기며, 7-WHERE 보충이 이 장을 이름 붙입니다.\" onclick=\"showAnswer(this)\">히브리 시 문법만.</button><div class=\"answer\"></div></div><div class=\"quiz-item\"><h3>5. Part 3의 통합된 주장은 무엇인가?</h3><button class=\"opt\" data-correct=\"false\" data-exp=\"본문이 어떻게 작동하는지와 누구를 위해 무엇을 하는지를 함께 보아야 합니다.\" onclick=\"showAnswer(this)\">Fee를 먼저 사용한 뒤 Osborne을 버린다.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"본문이 어떻게 작동하는지와 누구를 위해 무엇을 하는지를 함께 보아야 합니다.\" onclick=\"showAnswer(this)\">Osborne은 시편에만 사용한다.</button><button class=\"opt\" data-correct=\"true\" data-exp=\"본문이 어떻게 작동하는지와 누구를 위해 무엇을 하는지를 함께 보아야 합니다.\" onclick=\"showAnswer(this)\">책임 있는 복음서 해석학은 두 악기를 동시에 요구한다.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"본문이 어떻게 작동하는지와 누구를 위해 무엇을 하는지를 함께 보아야 합니다.\" onclick=\"showAnswer(this)\">통합은 두 방법을 하나의 규칙으로 축소하는 것이다.</button><div class=\"answer\"></div></div><div class=\"quiz-item\"><h3>6. 종합 원고가 말하는 목회적 대조는 무엇인가?</h3><button class=\"opt\" data-correct=\"false\" data-exp=\"Fee &amp; Stuart는 하나님 나라의 선포를, Osborne은 해결을 서두르지 않는 탄식 거주를 강조합니다.\" onclick=\"showAnswer(this)\">율법과 역사.</button><button class=\"opt\" data-correct=\"true\" data-exp=\"Fee &amp; Stuart는 하나님 나라의 선포를, Osborne은 해결을 서두르지 않는 탄식 거주를 강조합니다.\" onclick=\"showAnswer(this)\">선포의 논리와 임재의 논리.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"Fee &amp; Stuart는 하나님 나라의 선포를, Osborne은 해결을 서두르지 않는 탄식 거주를 강조합니다.\" onclick=\"showAnswer(this)\">그리스어와 히브리어.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"Fee &amp; Stuart는 하나님 나라의 선포를, Osborne은 해결을 서두르지 않는 탄식 거주를 강조합니다.\" onclick=\"showAnswer(this)\">교리와 문법.</button><div class=\"answer\"></div></div><div class=\"quiz-item\"><h3>7. 이번 주 학습 후 학생들이 더 이상 돌아갈 수 없는 읽기는 무엇인가?</h3><button class=\"opt\" data-correct=\"false\" data-exp=\"형성의 지속성은 학생들이 더 이상 하나의 도구만으로 읽거나 형식을 우회할 수 없음을 뜻합니다.\" onclick=\"showAnswer(this)\">세밀한 읽기.</button><button class=\"opt\" data-correct=\"true\" data-exp=\"형성의 지속성은 학생들이 더 이상 하나의 도구만으로 읽거나 형식을 우회할 수 없음을 뜻합니다.\" onclick=\"showAnswer(this)\">단일 악기 해석과 형식 우회적 추출.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"형성의 지속성은 학생들이 더 이상 하나의 도구만으로 읽거나 형식을 우회할 수 없음을 뜻합니다.\" onclick=\"showAnswer(this)\">이중언어 학습.</button><button class=\"opt\" data-correct=\"false\" data-exp=\"형성의 지속성은 학생들이 더 이상 하나의 도구만으로 읽거나 형식을 우회할 수 없음을 뜻합니다.\" onclick=\"showAnswer(this)\">역사적 맥락.</button><div class=\"answer\"></div></div></div>"}]}];
let lang = localStorage.getItem('bh_week9_lang_rebuilt') || 'en';
let section = localStorage.getItem('bh_week9_section_rebuilt') || DATA[0].id;
const subState = JSON.parse(localStorage.getItem('bh_week9_subs_rebuilt') || '{}');

function setLang(l) {
  lang = l;
  localStorage.setItem('bh_week9_lang_rebuilt', l);
  document.body.classList.toggle('lang-en', l === 'en');
  document.body.classList.toggle('lang-ko', l === 'ko');
  document.getElementById('langEn').classList.toggle('active', l==='en');
  document.getElementById('langKo').classList.toggle('active', l==='ko');
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = DATA.map(s => `
    <button class="navbtn ${s.id===section?'active':''}" onclick="showSection('${s.id}')">
      <span class="langblock en">${s.label_en}</span>
      <span class="langblock ko">${s.label_ko}</span>
    </button>
  `).join('');
}

function renderMain() {
  const s = DATA.find(x => x.id === section);
  const activeSub = subState[section] || s.subtabs[0].id;
  const subtabs = s.subtabs.map(st => `
    <button class="subbtn ${st.id===activeSub?'active':''}" onclick="showSub('${s.id}','${st.id}')">
      <span class="langblock en">${st.label_en}</span>
      <span class="langblock ko">${st.label_ko}</span>
    </button>
  `).join('');
  const subpanels = s.subtabs.map(st => `
    <div class="subpanel ${st.id===activeSub?'active':''}" id="${s.id}-${st.id}">
      <div class="langblock en">${st.en}</div>
      <div class="langblock ko">${st.ko}</div>
    </div>
  `).join('');
  document.getElementById('main').innerHTML = `<section class="panel active"><div class="subtabs">${subtabs}</div>${subpanels}</section>`;
  bindProgress();
  loadNotes();
  setLang(lang);
}

function showSection(id) {
  section = id;
  localStorage.setItem('bh_week9_section_rebuilt', id);
  renderNav();
  renderMain();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showSub(sectionId, subId) {
  subState[sectionId] = subId;
  localStorage.setItem('bh_week9_subs_rebuilt', JSON.stringify(subState));
  renderMain();
}

function toggleAllDetails(open) {
  document.querySelectorAll('details').forEach(d => d.open = open);
}

function bindProgress() {
  const boxes = [...document.querySelectorAll('.progress')];
  const saved = JSON.parse(localStorage.getItem('bh_week9_progress_rebuilt') || '[]');
  boxes.forEach((b,i)=> {
    b.checked = !!saved[i];
    b.onchange = () => {
      const vals = [...document.querySelectorAll('.progress')].map(x => x.checked);
      localStorage.setItem('bh_week9_progress_rebuilt', JSON.stringify(vals));
      updateProgress();
    };
  });
  updateProgress();
}

function updateProgress() {
  const boxes = [...document.querySelectorAll('.progress')];
  const count = boxes.filter(x=>x.checked).length;
  const el = document.getElementById('progressText');
  if(!el) return;
  el.textContent = lang === 'en'
    ? `Progress: ${count} / ${boxes.length} checkpoints checked`
    : `진행도: ${count} / ${boxes.length} 체크포인트 완료`;
}

function saveNotes() {
  const data = {
    noteA: document.getElementById('noteA')?.value || '',
    noteB: document.getElementById('noteB')?.value || '',
    noteC: document.getElementById('noteC')?.value || ''
  };
  localStorage.setItem('bh_week9_notes_rebuilt', JSON.stringify(data));
  alert(lang === 'en' ? 'Notes saved in this browser.' : '이 브라우저에 노트를 저장했습니다.');
}

function loadNotes() {
  const raw = localStorage.getItem('bh_week9_notes_rebuilt');
  if(!raw) return;
  try {
    const data = JSON.parse(raw);
    if(document.getElementById('noteA')) document.getElementById('noteA').value = data.noteA || '';
    if(document.getElementById('noteB')) document.getElementById('noteB').value = data.noteB || '';
    if(document.getElementById('noteC')) document.getElementById('noteC').value = data.noteC || '';
  } catch(e) {}
}

function clearNotes() {
  ['noteA','noteB','noteC'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
  localStorage.removeItem('bh_week9_notes_rebuilt');
}

function showAnswer(btn) {
  const wrap = btn.closest('.quiz-item');
  wrap.querySelectorAll('.opt').forEach(b => b.disabled = true);
  if(btn.dataset.correct === 'true') btn.classList.add('correct');
  else btn.classList.add('wrong');
  const answer = wrap.querySelector('.answer');
  answer.style.display = 'block';
  answer.textContent = btn.dataset.exp;
}

renderNav();
renderMain();
setLang(lang);
</script>
</body>
</html>
