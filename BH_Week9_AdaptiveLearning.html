<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BH Week 9 Adaptive App · Fee & Stuart + Osborne · EN/KO</title>
<style>

:root {
  --bg:#f6f8fc; --card:#ffffff; --ink:#1f2937; --muted:#6b7280; --line:#d6dbe6;
  --accent:#1d4ed8; --accent2:#0f766e; --soft:#eef2ff; --soft2:#ecfeff; --shadow:0 10px 28px rgba(15,23,42,.06);
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
header{position:sticky;top:0;z-index:50;background:#0f172a;color:#fff;padding:18px 22px;border-bottom:3px solid #2563eb}
header h1{margin:0;font-size:24px}
header .sub{margin-top:6px;color:#cbd5e1;font-size:13px;line-height:1.5}
.topbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}
.btn,.langbtn{border:1px solid rgba(255,255,255,.22);background:#1e293b;color:#fff;border-radius:10px;padding:9px 12px;cursor:pointer}
.langbtn.active{background:#2563eb;border-color:#2563eb}
.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 104px)}
nav{position:sticky;top:104px;height:calc(100vh - 104px);overflow:auto;background:#fff;border-right:1px solid var(--line);padding:16px}
nav h3{margin:0 0 12px 0;font-size:14px;color:#374151}
.navbtn{display:block;width:100%;text-align:left;padding:11px 12px;margin-bottom:8px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer}
.navbtn.active{background:var(--soft);border-color:var(--accent);color:var(--accent);font-weight:bold}
main{padding:22px}
.panel{display:none}
.panel.active{display:block}
.subtabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;position:sticky;top:110px;z-index:20;background:var(--bg);padding:4px 0 10px}
.subbtn{border:1px solid var(--line);background:#fff;padding:8px 12px;border-radius:999px;cursor:pointer}
.subbtn.active{background:var(--soft);border-color:var(--accent);color:var(--accent);font-weight:bold}
.subpanel{display:none}
.subpanel.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.card h2,.card h3{margin-top:0}
.hero{display:grid;grid-template-columns:1.35fr .95fr;gap:16px}
.mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.mini{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fbfdff}
.mini span{display:block;color:var(--muted);font-size:12px;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.badge{display:inline-block;padding:5px 10px;border-radius:999px;background:#e0f2fe;color:#075985;font-size:12px;margin-bottom:10px}
.callout{padding:12px 14px;border-left:4px solid var(--accent2);background:var(--soft2);border-radius:10px;line-height:1.65}
.warning{padding:12px 14px;border-left:4px solid #92400e;background:#fff7ed;border-radius:10px;line-height:1.65}
.theme-box{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid var(--line);padding:10px 11px;vertical-align:top;line-height:1.55}
th{background:#f8fafc;text-align:left}
ul,ol{line-height:1.7}
.checklist{list-style:none;padding-left:0}
.checklist li{margin:10px 0}
textarea{width:100%;min-height:140px;border:1px solid var(--line);border-radius:12px;padding:12px;font:inherit}
.note-label{display:block;font-weight:bold;margin:14px 0 8px 0}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn-row .btn{background:#fff;color:var(--ink);border:1px solid var(--line)}
.quiz-item{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;margin-bottom:14px}
.quiz-item .opt{display:block;width:100%;text-align:left;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fafcff;margin-top:8px;cursor:pointer}
.quiz-item .opt.correct{border-color:#0f766e;background:#ecfeff}
.quiz-item .opt.wrong{border-color:#dc2626;background:#fff1f2}
.answer{display:none;margin-top:10px;padding:10px 12px;border-left:4px solid var(--accent2);background:var(--soft2);border-radius:10px}
.muted{color:var(--muted)}
.langblock{display:none}
.lang-en .langblock.en{display:block}
.lang-ko .langblock.ko{display:block}
@media (max-width:980px) {
  .layout{grid-template-columns:1fr}
  nav{position:relative;top:0;height:auto;border-right:none;border-bottom:1px solid var(--line)}
  .hero,.grid2,.mini-grid{grid-template-columns:1fr}
  .subtabs{top:0}
}

.doc-title{font-size:26px;margin:0 0 8px 0}
.doc-details{border:1px solid var(--line);border-radius:14px;background:#fff;margin:12px 0;padding:0}
.doc-details summary{cursor:pointer;font-weight:bold;padding:12px 14px;background:#f8fafc;border-radius:14px}
.doc-details[open] summary{border-bottom:1px solid var(--line);border-bottom-left-radius:0;border-bottom-right-radius:0}
.doc-body{padding:14px 16px}
.manuscript p{line-height:1.78}
.manuscript h1,.manuscript h2,.manuscript h3{line-height:1.35}
.indent{padding-left:18px}
.compact p{margin:.35rem 0}
@media print {
  header, nav, .subtabs, .btn-row { display:none !important; }
  .layout { display:block; }
  main { padding:0; }
  .panel,.subpanel { display:block !important; }
  .card { box-shadow:none; page-break-inside:avoid; }
  details.doc-details { break-inside:avoid; }
  details.doc-details:not([open]) .doc-body { display:block; }
}

</style>
</head>

<script>
const DATA = [{"id": "hub", "label_en": "Week Hub", "label_ko": "주차 허브", "subtabs": [{"id": "snapshot", "label_en": "Snapshot", "label_ko": "개요", "en": "\n<div class=\"hero\">\n  <div class=\"card\">\n    <div class=\"badge\">BH Week 9</div>\n    <h2>Fee & Stuart + Osborne · Similarity, Difference, Integration</h2>\n    <p>This Week 9 adaptive app preserves the BH Week 7 app structure while replacing the internal manuscript content with the English synthesis manuscript. The focus is responsible Gospel hermeneutics: how Fee & Stuart and Osborne converge, diverge, and become a unified formation hermeneutic.</p>\n    <div class=\"callout\"><strong>Central BH focus:</strong> students learn that form carries meaning, that the reader's WHERE remains a live method boundary, and that Gospel interpretation requires both community-sensitive and form-sensitive reading.</div>\n  </div>\n  <div class=\"card\">\n    <h3>Week 9 at a glance</h3>\n    <div class=\"mini-grid\"><div class=\"mini\"><span>Primary sources</span><strong>Fee & Stuart + Osborne</strong></div><div class=\"mini\"><span>Core texts</span><strong>Luke 15 · Psalm 22 · Mark 15:34</strong></div><div class=\"mini\"><span>Main axis</span><strong>Similarity · Difference · Integration</strong></div><div class=\"mini\"><span>Method focus</span><strong>Two-level method + narrative/poetic criticism</strong></div><div class=\"mini\"><span>Formation focus</span><strong>Reader's WHERE</strong></div><div class=\"mini\"><span>Output goal</span><strong>Integrated synthesis statement</strong></div></div>\n  </div>\n</div>\n", "ko": "\n<div class=\"hero\">\n  <div class=\"card\">\n    <div class=\"badge\">BH 9주차</div>\n    <h2>Fee & Stuart + Osborne · 유사성, 차이점, 통합</h2>\n    <p>이 9주차 적응형 앱은 BH 7주차 앱의 구조를 유지하면서, 내부 원고를 한국어 종합 원고로 교체한 것입니다. 초점은 책임 있는 복음서 해석학입니다. Fee & Stuart와 Osborne이 어디에서 만나고, 어디에서 갈라지며, 어떻게 하나의 형성 해석학으로 통합되는지를 훈련합니다.</p>\n    <div class=\"callout\"><strong>핵심 BH 초점:</strong> 학생들은 형식이 의미를 운반한다는 것, 독자의 WHERE가 여전히 살아 있는 방법의 경계라는 것, 그리고 복음서 해석에는 공동체-민감성과 형식-민감성이 동시에 필요하다는 것을 배웁니다.</div>\n  </div>\n  <div class=\"card\">\n    <h3>9주차 한눈에 보기</h3>\n    <div class=\"mini-grid\"><div class=\"mini\"><span>주요 자료</span><strong>Fee & Stuart + Osborne</strong></div><div class=\"mini\"><span>핵심 본문</span><strong>눅 15 · 시 22 · 막 15:34</strong></div><div class=\"mini\"><span>주요 축</span><strong>유사성 · 차이점 · 통합</strong></div><div class=\"mini\"><span>방법 초점</span><strong>두 수준 방법 + 내러티브/시 해석</strong></div><div class=\"mini\"><span>형성 초점</span><strong>독자의 WHERE</strong></div><div class=\"mini\"><span>산출 목표</span><strong>통합 종합 진술문</strong></div></div>\n  </div>\n</div>\n"}, {"id": "objectives", "label_en": "Objectives", "label_ko": "학습 목표", "en": "\n<div class=\"card\">\n  <h2>Learning objectives</h2>\n  <ol>\n    <li>Explain the shared claim that biblical form carries meaning and performs interpretation.</li>\n    <li>Distinguish Fee & Stuart's community-to-text movement from Osborne's text-to-reader movement.</li>\n    <li>Map the already/not yet framework across communal formation and lament structure.</li>\n    <li>Identify the reader's WHERE as the shared boundary of both methods.</li>\n    <li>Produce a synthesis statement that uses both instruments without collapsing one into the other.</li>\n  </ol>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>학습 목표</h2>\n  <ol>\n    <li>성경 본문의 형식이 의미를 운반하고 해석을 수행한다는 공통 주장을 설명한다.</li>\n    <li>Fee & Stuart의 공동체에서 본문으로 향하는 움직임과 Osborne의 본문에서 독자로 향하는 움직임을 구별한다.</li>\n    <li>already/not yet 틀이 공동체 형성과 탄식 구조 안에서 어떻게 작동하는지 지도화한다.</li>\n    <li>독자의 WHERE가 두 방법이 공유하는 경계임을 식별한다.</li>\n    <li>두 악기 중 하나를 다른 하나로 축소하지 않고 통합 종합 진술문을 작성한다.</li>\n  </ol>\n</div>\n"}, {"id": "path", "label_en": "Study Path", "label_ko": "학습 경로", "en": "\n<div class=\"card\">\n  <h2>Recommended adaptive path</h2>\n  <ul class=\"checklist\">\n    <li><label><input type=\"checkbox\" class=\"progress\"> Begin with the Week Hub and identify the central interpretive problem.</label></li>\n    <li><label><input type=\"checkbox\" class=\"progress\"> Read Overview and Literary Outline before opening the full manuscript tabs.</label></li>\n    <li><label><input type=\"checkbox\" class=\"progress\"> Compare Fee & Stuart and Osborne in the Structure and Core Themes sections.</label></li>\n    <li><label><input type=\"checkbox\" class=\"progress\"> Work through the full English manuscript in Academic Manuscript.</label></li>\n    <li><label><input type=\"checkbox\" class=\"progress\"> Complete Guided Reading, Notes, and Quiz before class.</label></li>\n  </ul>\n  <div class=\"muted\" id=\"progressText\"></div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>권장 적응형 학습 경로</h2>\n  <ul class=\"checklist\">\n    <li><label><input type=\"checkbox\" class=\"progress\"> 주차 허브에서 시작하여 핵심 해석 문제를 확인한다.</label></li>\n    <li><label><input type=\"checkbox\" class=\"progress\"> 전체 원고 탭을 열기 전에 개요와 문학 개요를 먼저 읽는다.</label></li>\n    <li><label><input type=\"checkbox\" class=\"progress\"> 구조 개요와 핵심 주제에서 Fee & Stuart와 Osborne을 비교한다.</label></li>\n    <li><label><input type=\"checkbox\" class=\"progress\"> 학술 원고에서 한국어 원고 전체를 순서대로 읽는다.</label></li>\n    <li><label><input type=\"checkbox\" class=\"progress\"> 수업 전에 Guided Reading, Notes, Quiz를 완료한다.</label></li>\n  </ul>\n  <div class=\"muted\" id=\"progressText\"></div>\n</div>\n"}]}, {"id": "overview", "label_en": "Overview", "label_ko": "개요", "subtabs": [{"id": "problem", "label_en": "Core Problem", "label_ko": "핵심 문제", "en": "\n<div class=\"card\">\n  <h2>The core hermeneutical problem</h2>\n  <p>Students often read biblical texts by extracting a detachable “message” while leaving form, genre, reader-position, and community context behind. Week 9 corrects that habit by placing Fee & Stuart and Osborne into direct conversation.</p>\n  <div class=\"callout\"><strong>Integrated problem:</strong> How can the interpreter read what the text does through form while also asking for whom and why the text performs that work?</div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>핵심 해석학적 문제</h2>\n  <p>학생들은 종종 성경 본문에서 분리 가능한 “메시지”만 추출하고, 형식, 장르, 독자 위치, 공동체 맥락을 뒤에 남겨 둡니다. 9주차는 Fee & Stuart와 Osborne을 직접 대화시켜 이 습관을 교정합니다.</p>\n  <div class=\"callout\"><strong>통합 문제:</strong> 해석자는 본문이 형식을 통해 무엇을 하는지를 읽으면서 동시에 그 본문이 누구를 위해, 왜 그 일을 하는지를 어떻게 물을 수 있는가?</div>\n</div>\n"}, {"id": "why", "label_en": "Why this matters", "label_ko": "왜 중요한가", "en": "\n<div class=\"card\">\n  <h2>Why Week 9 matters for Biblical Hermeneutics</h2>\n  <ul>\n    <li>It prevents form-bypassing interpretation.</li>\n    <li>It prevents community-context from being reduced to background information.</li>\n    <li>It shows why proclamation and presence must be held together.</li>\n    <li>It prepares students to move from textbook method into formation-aware interpretation.</li>\n  </ul>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>Biblical Hermeneutics에서 9주차가 중요한 이유</h2>\n  <ul>\n    <li>형식을 우회하는 해석을 막습니다.</li>\n    <li>공동체 맥락을 단순 배경 정보로 축소하지 않게 합니다.</li>\n    <li>선포와 임재가 함께 붙들려야 함을 보여 줍니다.</li>\n    <li>학생들이 교재의 방법론에서 형성-인식적 해석으로 이동하도록 준비시킵니다.</li>\n  </ul>\n</div>\n"}, {"id": "questions", "label_en": "Major Questions", "label_ko": "주요 질문", "en": "\n<div class=\"card\">\n  <h2>Major questions for the week</h2>\n  <ul>\n    <li>How does form carry meaning rather than merely contain meaning?</li>\n    <li>What is gained and lost when interpretation starts from community situation?</li>\n    <li>What is gained and lost when interpretation starts from textual form?</li>\n    <li>Where is the actual reader located when the method reaches its boundary?</li>\n    <li>What would a synthesis statement sound like if both methods were active simultaneously?</li>\n  </ul>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>이번 주의 주요 질문</h2>\n  <ul>\n    <li>형식은 의미를 단지 담는 것이 아니라 어떻게 운반하는가?</li>\n    <li>공동체 상황에서 해석을 시작할 때 무엇을 얻고 무엇을 잃는가?</li>\n    <li>본문 형식에서 해석을 시작할 때 무엇을 얻고 무엇을 잃는가?</li>\n    <li>방법이 자신의 경계에 도달할 때 실제 독자는 어디에 위치하는가?</li>\n    <li>두 방법이 동시에 작동하는 종합 진술문은 어떤 모습이어야 하는가?</li>\n  </ul>\n</div>\n"}]}, {"id": "literary", "label_en": "Literary Outline", "label_ko": "문학 개요", "subtabs": [{"id": "texts", "label_en": "Textual Terrain", "label_ko": "본문 지형", "en": "\n<div class=\"card\">\n  <h2>Textual terrain of Week 9</h2>\n  <table>\n    <tr><th>Instrument</th><th>Primary texts</th><th>Interpretive focus</th></tr>\n    <tr><td>Fee & Stuart</td><td>Luke 15:1–2, 11–32</td><td>Gospels as pastoral documents shaped for communities navigating the already/not yet.</td></tr>\n    <tr><td>Osborne</td><td>Psalm 22:1–24 + Mark 15:34</td><td>Narrative criticism, Hebrew poetry, lament form, and implied reader positioning.</td></tr>\n    <tr><td>Integrated reading</td><td>Luke 15 + Psalm 22/Mark 15:34</td><td>Form, community, lament, proclamation, presence, and reader's WHERE.</td></tr>\n  </table>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>9주차의 본문 지형</h2>\n  <table>\n    <tr><th>악기</th><th>주요 본문</th><th>해석 초점</th></tr>\n    <tr><td>Fee & Stuart</td><td>누가복음 15:1–2, 11–32</td><td>already/not yet을 통과하는 공동체를 위해 형성된 목회적 문서로서의 복음서.</td></tr>\n    <tr><td>Osborne</td><td>시편 22:1–24 + 마가복음 15:34</td><td>내러티브 비평, 히브리 시, 탄식 형식, 암시된 독자의 위치.</td></tr>\n    <tr><td>통합적 읽기</td><td>누가복음 15장 + 시편 22편/마가복음 15:34</td><td>형식, 공동체, 탄식, 선포, 임재, 독자의 WHERE.</td></tr>\n  </table>\n</div>\n"}, {"id": "architecture", "label_en": "Three-Part Architecture", "label_ko": "세 부분 구조", "en": "\n<div class=\"card\">\n  <h2>Synthesis architecture</h2>\n  <table>\n    <tr><th>Part</th><th>Purpose</th><th>Learning movement</th></tr>\n    <tr><td>Similarity</td><td>Name the common ground.</td><td>Form carries meaning; already/not yet; reader's WHERE; shared pedagogical structure.</td></tr>\n    <tr><td>Difference</td><td>Name the methodological divergence.</td><td>Community vs. text; proclamation vs. presence; sequence vs. interdependence.</td></tr>\n    <tr><td>Integration</td><td>Hold both instruments simultaneously.</td><td>Topological reading; shared WHERE-WHO-WHAT; 7-WHERE supplement; synthesis statement.</td></tr>\n  </table>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>종합의 구조</h2>\n  <table>\n    <tr><th>부분</th><th>목적</th><th>학습 이동</th></tr>\n    <tr><td>유사성</td><td>공통 지반을 명명한다.</td><td>형식은 의미를 운반한다; already/not yet; 독자의 WHERE; 공유된 교육학적 구조.</td></tr>\n    <tr><td>차이점</td><td>방법론적 갈라짐을 명명한다.</td><td>공동체 vs. 본문; 선포 vs. 임재; 순서 vs. 상호의존성.</td></tr>\n    <tr><td>통합</td><td>두 악기를 동시에 붙든다.</td><td>위상학적 읽기; 공유된 WHERE-WHO-WHAT; 7-WHERE 보충; 종합 진술문.</td></tr>\n  </table>\n</div>\n"}, {"id": "form", "label_en": "Form Carries Meaning", "label_ko": "형식은 의미를 운반한다", "en": "\n<div class=\"card\">\n  <h2>Literary principle</h2>\n  <p>The shared claim is that biblical form is not a removable container. The structure, narrator, implied reader, parallelism, plot, and arrangement are not decorations around theology; they are how the text performs its theology.</p>\n  <div class=\"callout\">Adaptive reading task: do not ask first, “What is the message?” Ask first, “How does this text make its claim through its form?”</div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>문학 원리</h2>\n  <p>공유된 주장은 성경 본문의 형식이 제거 가능한 용기가 아니라는 것입니다. 구조, 화자, 암시된 독자, 평행법, 플롯, 배열은 신학 주변의 장식이 아니라 본문이 자기 신학을 수행하는 방식입니다.</p>\n  <div class=\"callout\">적응형 읽기 과제: 먼저 “메시지가 무엇인가?”라고 묻지 말고, “이 본문은 자신의 형식을 통해 어떻게 주장을 만드는가?”라고 물으십시오.</div>\n</div>\n"}]}, {"id": "structure", "label_en": "Structure Outline", "label_ko": "구조 개요", "subtabs": [{"id": "six", "label_en": "Six-Module Frame", "label_ko": "여섯 모듈 프레임", "en": "\n<div class=\"card\">\n  <h2>Shared six-module pedagogical architecture</h2>\n  <table>\n    <tr><th>Module</th><th>Function</th></tr>\n    <tr><td>WHERE-WHO-WHAT</td><td>Names the relational field, identity, and action generated by reading.</td></tr>\n    <tr><td>Two-level method</td><td>Prevents collapse between Jesus' original context and the evangelists' ecclesial shaping.</td></tr>\n    <tr><td>Intra-chapter tensions</td><td>Identifies the productive tensions inside each textbook method.</td></tr>\n    <tr><td>Method boundary</td><td>Names what the method cannot fully account for: the actual reader's WHERE.</td></tr>\n    <tr><td>Integration</td><td>Holds community-context and formal architecture in the same relational field.</td></tr>\n    <tr><td>Synthesis / re-entry</td><td>Returns the student to teaching, preaching, and formation with a changed interpretive posture.</td></tr>\n  </table>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>공유된 여섯 모듈 교육학 구조</h2>\n  <table>\n    <tr><th>모듈</th><th>기능</th></tr>\n    <tr><td>WHERE-WHO-WHAT</td><td>읽기를 통해 생성되는 관계적 장, 정체성, 행동을 명명한다.</td></tr>\n    <tr><td>두 수준 방법</td><td>예수의 원래 맥락과 복음서 저자들의 교회적 형성을 붕괴시키지 않게 한다.</td></tr>\n    <tr><td>장 내부 긴장</td><td>각 교재 방법 안의 생산적 긴장을 식별한다.</td></tr>\n    <tr><td>방법의 경계</td><td>방법이 온전히 설명하지 못하는 것, 곧 실제 독자의 WHERE를 명명한다.</td></tr>\n    <tr><td>통합</td><td>공동체 맥락과 형식 아키텍처를 같은 관계적 장 안에 붙든다.</td></tr>\n    <tr><td>종합 / 재진입</td><td>학생이 변화된 해석 자세로 가르침, 설교, 형성의 자리로 돌아가게 한다.</td></tr>\n  </table>\n</div>\n"}, {"id": "method", "label_en": "Method Contrast", "label_ko": "방법 대조", "en": "\n<div class=\"card\">\n  <h2>Methodological contrast</h2>\n  <table>\n    <tr><th>Dimension</th><th>Fee & Stuart</th><th>Osborne</th></tr>\n    <tr><td>Primary question</td><td>Who is the community and what tension is it navigating?</td><td>How does the text work as a unified literary structure?</td></tr>\n    <tr><td>Movement</td><td>Community situation → compositional strategy.</td><td>Text's formal mechanics → reader's required posture.</td></tr>\n    <tr><td>Form</td><td>Pastoral strategy: selectivity, arrangement, adaptation.</td><td>Theological argument: narrator, plot, parallelism.</td></tr>\n    <tr><td>Reader</td><td>Community member navigating historical/ecclesial levels.</td><td>Implied reader positioned by narrative design.</td></tr>\n  </table>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>방법론적 대조</h2>\n  <table>\n    <tr><th>차원</th><th>Fee & Stuart</th><th>Osborne</th></tr>\n    <tr><td>일차 질문</td><td>이 공동체는 누구이며 어떤 긴장을 통과하고 있는가?</td><td>이 본문은 하나의 통일된 문학 구조로서 어떻게 작동하는가?</td></tr>\n    <tr><td>이동</td><td>공동체 상황 → 구성 전략.</td><td>본문의 형식 메커니즘 → 독자가 요구받는 자세.</td></tr>\n    <tr><td>형식</td><td>목회적 전략: 선택, 배열, 적응.</td><td>신학적 논증: 화자, 플롯, 평행법.</td></tr>\n    <tr><td>독자</td><td>역사적/교회적 수준을 통과하는 공동체 구성원.</td><td>내러티브 설계에 의해 위치 지워지는 암시된 독자.</td></tr>\n  </table>\n</div>\n"}, {"id": "tension", "label_en": "Productive Tensions", "label_ko": "생산적 긴장", "en": "\n<div class=\"card\">\n  <h2>Productive tensions</h2>\n  <div class=\"grid2\">\n    <div class=\"theme-box\"><h3>Fee & Stuart</h3><p>The kingdom framework appears late, even though it funds the method. The instructor must decide whether to follow the chapter sequence or invert it pedagogically.</p></div>\n    <div class=\"theme-box\"><h3>Osborne</h3><p>History and literary artistry are interdependent, but the exact relation remains unresolved. Does history constrain literary reading, or does literary form produce the history that matters?</p></div>\n  </div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>생산적 긴장</h2>\n  <div class=\"grid2\">\n    <div class=\"theme-box\"><h3>Fee & Stuart</h3><p>하나님 나라 틀은 방법을 떠받치지만 장의 마지막에 등장합니다. 교수자는 장의 순서를 따를지, 교육학적으로 뒤집을지 결정해야 합니다.</p></div>\n    <div class=\"theme-box\"><h3>Osborne</h3><p>역사와 문학적 예술성은 상호의존적이지만 그 관계는 최종적으로 판정되지 않습니다. 역사가 문학적 읽기를 제약하는가, 아니면 문학 형식이 신학적으로 중요한 역사를 생산하는가?</p></div>\n  </div>\n</div>\n"}, {"id": "boundary", "label_en": "Method Boundary", "label_ko": "방법의 경계", "en": "\n<div class=\"card\">\n  <h2>The reader's WHERE</h2>\n  <p>Both methods leave the actual reader's location at the edge: not merely the implied reader, not merely a generic church member, but the concrete reader with physical, relational, existential, covenantal, spiritual, cultural, and ideological situatedness.</p>\n  <div class=\"warning\"><strong>BH warning:</strong> A method can be technically correct while still failing to name where the interpreter stands.</div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>독자의 WHERE</h2>\n  <p>두 방법 모두 실제 독자의 위치를 방법의 가장자리에 남깁니다. 단순히 암시된 독자도 아니고, 일반적 교회 구성원도 아니라, 신체적, 관계적, 실존적, 언약적, 영적, 문화적, 이데올로기적 위치를 가진 구체적 독자입니다.</p>\n  <div class=\"warning\"><strong>BH 경고:</strong> 어떤 방법은 기술적으로는 정확하지만, 해석자가 어디에 서 있는지를 명명하는 데 실패할 수 있습니다.</div>\n</div>\n"}]}, {"id": "themes", "label_en": "Core Themes", "label_ko": "핵심 주제", "subtabs": [{"id": "similarity", "label_en": "Similarity", "label_ko": "유사성", "en": "\n<div class=\"card\">\n  <h2>Similarity: shared claims</h2>\n  <div class=\"theme-box\"><h3>Form carries meaning</h3><p>The text's shape is part of the text's claim.</p></div>\n  <div class=\"theme-box\"><h3>Already / not yet</h3><p>For Fee & Stuart this is the believer's communal condition; for Osborne it is the lament's structure.</p></div>\n  <div class=\"theme-box\"><h3>Reader's WHERE</h3><p>Both methods reach the same boundary and require a formation supplement.</p></div>\n  <div class=\"theme-box\"><h3>Formation permanence</h3><p>Students cannot return to single-level or form-bypassing reading.</p></div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>유사성: 공유된 주장</h2>\n  <div class=\"theme-box\"><h3>형식은 의미를 운반한다</h3><p>본문의 형태는 본문의 주장 그 자체의 일부입니다.</p></div>\n  <div class=\"theme-box\"><h3>Already / not yet</h3><p>Fee & Stuart에게 이것은 신자의 공동체적 조건이고, Osborne에게는 탄식의 구조입니다.</p></div>\n  <div class=\"theme-box\"><h3>독자의 WHERE</h3><p>두 방법 모두 같은 경계에 도달하며 형성적 보충을 요구합니다.</p></div>\n  <div class=\"theme-box\"><h3>형성의 지속성</h3><p>학생들은 더 이상 단일 수준 읽기나 형식 우회적 읽기로 돌아갈 수 없습니다.</p></div>\n</div>\n"}, {"id": "difference", "label_en": "Difference", "label_ko": "차이점", "en": "\n<div class=\"card\">\n  <h2>Difference: method and pastoral instinct</h2>\n  <div class=\"grid2\">\n    <div class=\"theme-box\"><h3>Fee & Stuart</h3><p>Primary instinct: proclamation. What is the kingdom announcing, and how does its economy of belonging reshape the community?</p></div>\n    <div class=\"theme-box\"><h3>Osborne</h3><p>Primary instinct: presence. Can the community inhabit lament long enough without rushing to resolution?</p></div>\n  </div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>차이점: 방법과 목회적 본능</h2>\n  <div class=\"grid2\">\n    <div class=\"theme-box\"><h3>Fee & Stuart</h3><p>일차 본능: 선포. 하나님 나라는 무엇을 선포하며, 그 소속의 경제는 공동체를 어떻게 재형성하는가?</p></div>\n    <div class=\"theme-box\"><h3>Osborne</h3><p>일차 본능: 임재. 공동체는 해결을 서두르지 않고 탄식 안에 충분히 오래 머물 수 있는가?</p></div>\n  </div>\n</div>\n"}, {"id": "integration", "label_en": "Integration", "label_ko": "통합", "en": "\n<div class=\"card\">\n  <h2>Integration: two instruments, one formation</h2>\n  <p>The integrated claim is not additive. It is topological: both instruments operate simultaneously in the same relational field.</p>\n  <table>\n    <tr><th>Question</th><th>Instrument</th></tr>\n    <tr><td>How does the text work through its formal architecture?</td><td>Osborne</td></tr>\n    <tr><td>For whom and why is the text doing this work?</td><td>Fee & Stuart</td></tr>\n    <tr><td>Where is the actual reader located as the text performs this work?</td><td>Integrated formation hermeneutic</td></tr>\n  </table>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>통합: 두 악기, 하나의 형성</h2>\n  <p>통합된 주장은 더하기 방식이 아닙니다. 그것은 위상학적입니다. 두 악기가 동일한 관계적 장 안에서 동시에 작동합니다.</p>\n  <table>\n    <tr><th>질문</th><th>악기</th></tr>\n    <tr><td>본문은 자신의 형식 아키텍처를 통해 어떻게 작동하는가?</td><td>Osborne</td></tr>\n    <tr><td>본문은 누구를 위해, 왜 이 일을 하는가?</td><td>Fee & Stuart</td></tr>\n    <tr><td>본문이 이 일을 수행할 때 실제 독자는 어디에 위치하는가?</td><td>통합 형성 해석학</td></tr>\n  </table>\n</div>\n"}]}, {"id": "academic", "label_en": "Academic Manuscript", "label_ko": "학술 원고", "subtabs": [{"id": "part01", "label_en": "Parts 0–1 / Part 1", "label_ko": "Part 0–1 / Part 1", "en": "<div class=\"card manuscript\"><h2>English Manuscript · Parts 0–1</h2><details open class=\"doc-details\"><summary>Front Matter</summary><div class=\"doc-body\"><h1 class=\"doc-title\">Fee &amp; Stuart + Osborne</h1>\n<h3>Synthesis: Similarity, Difference, and Integration</h3>\n<p>BH Lecture Synthesis Document · MetaArchitect v7.0.0 · CIM Atlanta</p></div></details><details  class=\"doc-details\"><summary>PART 0 — SYNTHESIS ARCHITECTURE</summary><div class=\"doc-body\"><h2>PART 0 — SYNTHESIS ARCHITECTURE</h2>\n<p>This document merges the two BH lecture manuscripts — Fee &amp; Stuart on the Gospels (Luke 15:1–2, 11–32) and Osborne on Narrative Criticism and Hebrew Poetry (Psalm 22:1–24 + Mark 15:34) — into a three-part synthesis: where the manuscripts share common ground, where they diverge in method and emphasis, and how they integrate into a unified formation hermeneutic. The synthesis is designed for use in classroom coordination, professor-facing planning, or as a capstone framing text for both sessions.</p>\n<p>The synthesis proceeds along three axes:</p>\n<p>Similarity — shared claims, shared structures, shared silences</p>\n<p>Difference — methodological divergence, theological emphasis, textual range</p>\n<p>Integration — how the two methods become more than the sum of their parts</p></div></details><details  class=\"doc-details\"><summary>PART 1 — SIMILARITY</summary><div class=\"doc-body\"><h2>PART 1 — SIMILARITY</h2>\n<h3>1.1 Shared Hermeneutical Claim: Form Carries Meaning</h3>\n<p>Both manuscripts converge on a single non-negotiable hermeneutical claim: the form of a biblical text is not a container for separable content — it is itself the theological argument. Fee &amp; Stuart establish this through their insistence on the Gospels&#x27; two-level nature: the historical level (Jesus&#x27; original context) and the ecclesial level (the evangelists&#x27; pastoral reshaping) cannot be collapsed without losing the text&#x27;s theological specificity. Osborne establishes the same claim through narrative poetics: the narrator&#x27;s point of view, the implied reader&#x27;s position, the structure of parallelism in Hebrew poetry — these formal elements do not merely package the theology; they enact it.</p>\n<p>Both manuscripts, therefore, make the same foundational pedagogical move: they refuse to let the student extract a &#x27;message&#x27; from a text while leaving the text&#x27;s form behind. The student who has passed through either lecture is no longer a form-bypassing reader. That is formation permanence — identical in both manuscripts, achieved by different methodological routes.</p>\n<h3>1.2 Shared Textual Bridge: The Already/Not Yet</h3>\n<p>Both manuscripts invoke the &#x27;already/not yet&#x27; eschatological framework, and both use it as more than a doctrinal category. For Fee &amp; Stuart, it names the structural condition of the believer &#x27;living between the times&#x27; — already forgiven, not yet perfected — which is precisely the condition the Gospels were written to address. For Osborne, the &#x27;already/not yet&#x27; appears more briefly but with topological precision: it names the condition of the lament itself. Psalm 22&#x27;s speaker is already in covenant address (&#x27;My God&#x27;) and not yet in experienced presence (&#x27;Why have you forsaken me?&#x27;). The same eschatological structure that Fee &amp; Stuart apply to the reader&#x27;s communal condition, Osborne maps onto the form of the lament.</p>\n<p>This convergence is not accidental. Both authors are working with a canonical-theological hermeneutic that refuses to separate the interpreter&#x27;s condition from the text&#x27;s claim. The &#x27;already/not yet&#x27; is simultaneously the reader&#x27;s existential condition and the text&#x27;s structural tension.</p>\n<h3>1.3 Shared Method Boundary: The Reader&#x27;s WHERE</h3>\n<p>Both manuscripts arrive at exactly the same boundary from different sides. Fee &amp; Stuart&#x27;s method boundary is explicitly named: their two-level framework is identical regardless of whether the reader is in the &#x27;already&#x27; of relative stability or the &#x27;not yet&#x27; of structural marginalization. The reader&#x27;s WHERE — their structural position in the relational field — is left at the method&#x27;s edge. Osborne&#x27;s method boundary is equally explicit: his &#x27;implied reader&#x27; is a literary construct produced by the text, not the actual reader with their covenantal, ideological, existential, and cultural positioning. Neither method produces what the other cannot.</p>\n<p>The shared silence is the shared gift. Both authors, from different methodological angles, arrive at the same open door: the formation question that responsible interpretation must supply when the literary-historical method runs out. This convergence at the method boundary is the most important shared feature of the two manuscripts.</p>\n<h3>1.4 Shared Pedagogical Structure</h3>\n<p>Both manuscripts are built around the same six-module architecture (WHERE-WHO-WHAT ↔ two-level method ↔ intra-chapter tensions ↔ method boundary ↔ integration ↔ synthesis/re-entry) and both close with Socratic-Kenotic Etic Questions that push the learner toward the Outside. Both use the WHERE-WHO-WHAT triad as the formation spine. Both name the formation permanent: after the lecture, the student cannot return to prior single-level or form-bypassing reading. These are not minor parallels — they represent the same MetaArchitect topological architecture applied to two different textual sources and methodological traditions.</p></div></details></div>", "ko": "<div class=\"card manuscript\"><h2>한국어 원고 · Part 1</h2><details open class=\"doc-details\"><summary>Front Matter</summary><div class=\"doc-body\"><h1 class=\"doc-title\">Fee &amp; Stuart + Osborne</h1>\n<h3>종합: 유사성, 차이점, 그리고 통합</h3></div></details><details  class=\"doc-details\"><summary>PART 1 — 유사성</summary><div class=\"doc-body\"><h2>PART 1 — 유사성</h2>\n<h3>1.1 공유된 해석학적 주장: 형식은 의미를 운반한다</h3>\n<p>두 원고는 하나의 타협 불가능한 해석학적 주장으로 수렴한다. 곧 성경 본문의 형식은 분리 가능한 내용을 담는 단순한 용기가 아니라, 그 자체가 신학적 논증이라는 것이다. Fee &amp; Stuart는 이것을 복음서의 두 수준적 성격에 대한 강조를 통해 확립한다. 역사적 수준, 곧 예수의 원래 맥락과 교회적 수준, 곧 복음서 저자들이 이후 공동체를 위해 목회적으로 재구성한 수준은 본문의 신학적 특수성을 잃지 않기 위해 서로 붕괴되어서는 안 된다. Osborne은 동일한 주장을 내러티브 시학을 통해 확립한다. 화자의 관점, 암시된 독자의 위치, 히브리 시의 평행법 구조 — 이러한 형식적 요소들은 단지 신학을 포장하는 것이 아니라 그것을 수행한다.</p>\n<p>그러므로 두 원고는 동일한 근본적 교육학적 움직임을 만든다. 즉 학생이 본문의 형식을 뒤에 남겨 둔 채 본문에서 “메시지”만 추출하도록 내버려 두지 않는다. 두 강의 중 어느 하나를 통과한 학생도 더 이상 형식을 우회하는 독자로 남을 수 없다. 이것이 형성의 지속성이다. 두 원고에서 동일하게 일어나지만, 서로 다른 방법론적 경로를 통해 성취된다.</p>\n<h3>1.2 공유된 본문적 다리: Already/Not Yet</h3>\n<p>두 원고는 모두 “already/not yet” 종말론적 틀을 호출하며, 둘 다 이것을 단순한 교리적 범주 이상으로 사용한다. Fee &amp; Stuart에게 이것은 “두 시대 사이에서 살아가는” 신자의 구조적 조건을 가리킨다. 신자는 이미 용서받았지만 아직 완성되지 않았다. 이것이 바로 복음서가 다루기 위해 기록된 조건이다. Osborne에게 “already/not yet”은 더 짧게 등장하지만, 위상학적으로는 매우 정밀하게 나타난다. 그것은 탄식 자체의 조건을 가리킨다. 시편 22편의 화자는 이미 언약적 부름 안에 있다. “나의 하나님.” 그러나 아직 경험된 임재 안에는 있지 않다. “어찌하여 나를 버리셨나이까?” Fee &amp; Stuart가 독자의 공동체적 조건에 적용하는 동일한 종말론적 구조를 Osborne은 탄식의 형식에 지도화한다.</p>\n<p>이 수렴은 우연이 아니다. 두 저자는 모두 해석자의 조건을 본문의 주장으로부터 분리하기를 거부하는 정경적-신학적 해석학 안에서 작업하고 있다. “Already/not yet”은 동시에 독자의 실존적 조건이며 본문의 구조적 긴장이다.</p>\n<h3>1.3 공유된 방법의 경계: 독자의 WHERE</h3>\n<p>두 원고는 서로 다른 쪽에서 출발하지만 정확히 동일한 경계에 도달한다. Fee &amp; Stuart의 방법 경계는 명시적으로 이름 붙여진다. 그들의 두 수준 틀은 독자가 상대적 안정이라는 “already” 안에 있든, 구조적 주변화라는 “not yet” 안에 있든 동일하게 적용된다. 독자의 WHERE — 곧 관계적 장 안에서 독자가 차지하는 구조적 위치 — 는 방법의 가장자리에 남겨진다. Osborne의 방법 경계도 마찬가지로 명시적이다. 그의 “암시된 독자”는 본문이 만들어 내는 문학적 구성물이지, 자신의 언약적, 이데올로기적, 실존적, 문화적 위치를 지닌 실제 독자가 아니다. 두 방법 중 어느 것도 다른 방법이 할 수 없는 것을 생산하지 못한다.</p>\n<p>공유된 침묵이 곧 공유된 선물이다. 두 저자는 서로 다른 방법론적 각도에서 동일한 열린 문에 도달한다. 곧 문학적-역사적 방법이 끝나는 지점에서 책임 있는 해석이 반드시 보충해야 하는 형성 질문이다. 방법의 경계에서 일어나는 이 수렴은 두 원고가 공유하는 가장 중요한 특징이다.</p>\n<h3>1.4 공유된 교육학적 구조</h3>\n<p>두 원고는 동일한 여섯 모듈 아키텍처를 중심으로 구성되어 있다. 그 구조는 다음과 같다. WHERE-WHO-WHAT ↔ 두 수준 방법 ↔ 장 내부 긴장 ↔ 방법의 경계 ↔ 통합 ↔ 종합/재진입. 그리고 두 원고 모두 학습자를 Outside를 향해 밀어내는 Socratic-Kenotic ETic Questions로 마무리된다. 두 원고 모두 WHERE-WHO-WHAT 삼중 구조를 형성의 척추로 사용한다. 두 원고 모두 형성의 지속성을 명명한다. 강의 이후 학생은 이전의 단일 수준 읽기 또는 형식 우회적 읽기로 돌아갈 수 없다. 이것들은 사소한 유사점이 아니다. 이것들은 서로 다른 본문 자료와 서로 다른 방법론 전통에 동일한 MetaArchitect 위상학적 아키텍처가 적용된 것이다.</p></div></details></div>"}, {"id": "part2", "label_en": "Part 2", "label_ko": "Part 2", "en": "<div class=\"card manuscript\"><h2>English Manuscript · Part 2</h2><details open class=\"doc-details\"><summary>PART 2 — DIFFERENCE</summary><div class=\"doc-body\"><h2>PART 2 — DIFFERENCE</h2>\n<h3>2.1 Methodological Starting Point: Community vs. Text</h3>\n<p>Fee &amp; Stuart&#x27;s primary methodological question is social and ecclesial: who is the community for which this Gospel is written, and what tension is it navigating? Their analytical movement is from the community&#x27;s situation inward toward the text&#x27;s compositional strategies. Selectivity, arrangement, and adaptation are understood as pastoral responses to a specific community&#x27;s needs. The Gospels, for Fee &amp; Stuart, are documents of pastoral care — and their interpretation requires reconstructing the community that needed this particular pastoral care.</p>\n<p>Osborne&#x27;s primary methodological question is literary and formal: how does the text work as a unified narrative or poetic structure? His analytical movement is from the text&#x27;s internal mechanics outward toward the reader. The narrator&#x27;s point of view, the implied reader&#x27;s required posture, the plot&#x27;s conflict structure — these are intrinsic features of the text that shape what the reader can receive. Osborne gives the text more authority as a self-interpreting formal system.</p>\n<table><tr><th>Dimension</th><th>Fee &amp; Stuart</th><th>Osborne</th></tr><tr><td>Primary question</td><td>Who is the community? What tension is it navigating?</td><td>How does this text work as a unified literary structure?</td></tr><tr><td>Analytical direction</td><td>Community situation → compositional strategies</td><td>Text&#x27;s formal mechanics → reader&#x27;s required posture</td></tr><tr><td>View of the Gospels</td><td>Pastoral documents for specific communities</td><td>Narrative wholes with intrinsic interpretive logic</td></tr><tr><td>View of the reader</td><td>Community member navigating historical/ecclesial levels</td><td>Implied reader positioned by the text&#x27;s narrative design</td></tr><tr><td>Primary tool</td><td>Horizontal/vertical reading; two-level method</td><td>Narrative criticism; close reading; genre analysis</td></tr><tr><td>Treatment of form</td><td>Form as pastoral strategy (selectivity/arrangement/adaptation)</td><td>Form as theological argument (narrator, plot, parallelism)</td></tr><tr><td>Kingdom framework</td><td>Kingdom as eschatological ground (appears last)</td><td>Eschatological tension mapped through lament structure</td></tr><tr><td>Biblical texts</td><td>Luke 15:1–2, 11–32 (narrative parable)</td><td>Psalm 22:1–24 + Mark 15:34 (lament + intertextual citation)</td></tr></table>\n<h3>2.2 Theological Emphasis: Proclamation vs. Presence</h3>\n<p>Fee &amp; Stuart&#x27;s kingdom framework centers on proclamation: the Gospels announce the dynamic reign of God breaking into history, and the interpreter&#x27;s task is to locate that announcement in its two-level historical-ecclesial context. The theological claim is that grace is always prior — &#x27;grace precedes ethics&#x27; — and that Gospel reading is the act of receiving that proclamation and being shaped by it. The father runs before the son completes his speech.</p>\n<p>Osborne&#x27;s framework, particularly through the lament genre, centers on presence: the text&#x27;s primary demand is not proclamation but inhabitation. The interpreter is called to be present to the lament form without rushing toward resolution — to hold verse 1 (&#x27;My God, why have you forsaken me?&#x27;) long enough to reach verse 24 (&#x27;he has not despised or scorned the suffering of the afflicted one&#x27;) at the pace the lament itself sets. The theological claim is that the cry of dereliction is not the collapse of faith — it is the faith. Staying with the form is the theological act.</p>\n<p>These are not contradictory emphases. But they produce different pastoral instincts. Fee &amp; Stuart produces an interpreter inclined to ask: &#x27;What is the kingdom announcing in this text, and how does its structural economy of belonging reshape my community?&#x27; Osborne produces an interpreter inclined to ask: &#x27;Am I rushing past the form? Am I allowing the community to inhabit the lament long enough for something new to emerge?&#x27; The first is proclamation-logic; the second is presence-logic. Both are necessary.</p>\n<h3>2.3 Intra-Chapter Tensions: Sequence vs. Interdependence</h3>\n<p>Fee &amp; Stuart&#x27;s most productive internal tension is structural: the kingdom framework (which the chapter identifies as the indispensable interpretive key) appears last, after the historical and literary methods have been introduced. This creates a pedagogical paradox — the method that funds everything appears as a conclusion rather than a foundation. The instructor must decide whether to teach the chapter&#x27;s sequence (methods first, framework last) or to invert it.</p>\n<p>Osborne&#x27;s most productive internal tension is ontological: history and literary artistry are said to be interdependent, but the chapter never adjudicates their relationship. Does history constrain literary interpretation, or does literary form produce the history that matters theologically? This is not a sequencing problem but a ground-level epistemological question about what kind of entity a biblical text is.</p>\n<p>The two tensions, taken together, produce the right pedagogical question: What is prior — the community&#x27;s situation (Fee &amp; Stuart), the kingdom&#x27;s arrival (Fee &amp; Stuart&#x27;s inverted reading), the text&#x27;s literary structure (Osborne), or the history the text claims to interpret (Osborne&#x27;s counter-pressure)? The integrated answer — which neither manuscript alone can give — is that all four are co-constitutive. Formation hermeneutics holds them all.</p>\n<h3>2.4 Genesis of the Reader&#x27;s WHERE</h3>\n<p>Both manuscripts identify the reader&#x27;s WHERE as the method&#x27;s boundary. But they arrive there from different sides, and this produces different practical implications for the formation guide.</p>\n<p>Fee &amp; Stuart&#x27;s version: The reader&#x27;s structural position in the already/not yet field — whether they are in the &#x27;already&#x27; of relative stability or the &#x27;not yet&#x27; of structural exclusion — determines what the kingdom proclamation does in them. The method cannot account for this. The formation supplement must name: from which position in the parable&#x27;s relational field (younger son / older son / father / Pharisee) is this reader encountering the kingdom?</p>\n<p>Osborne&#x27;s version: The reader&#x27;s actual covenantal, ideological, existential, and cultural positioning is left outside the implied-reader construct. The formation supplement must name: what does the lament&#x27;s WHERE reveal about this reader&#x27;s structural WHERE? Are they reading Psalm 22 from a position of academic distance, or from inside a lament they cannot yet name?</p>\n<p>Fee &amp; Stuart&#x27;s WHERE is primarily social-structural (position in the economy of belonging). Osborne&#x27;s WHERE is primarily existential-covenantal (position in the lament field). The integrated WHERE question — as developed in the 7-WHERE Protocol — holds both simultaneously.</p></div></details></div>", "ko": "<div class=\"card manuscript\"><h2>한국어 원고 · Part 2</h2><details open class=\"doc-details\"><summary>PART 2 — 차이점</summary><div class=\"doc-body\"><h2>PART 2 — 차이점</h2>\n<h3>2.1 방법론적 출발점: 공동체 vs. 본문</h3>\n<p>Fee &amp; Stuart의 일차적 방법론 질문은 사회적이고 교회적이다. 이 복음서는 어떤 공동체를 위해 기록되었는가? 그 공동체는 어떤 긴장을 통과하고 있는가? 그들의 분석적 움직임은 공동체의 상황에서 출발하여 본문의 구성 전략 안으로 들어간다. 선택, 배열, 적응은 특정 공동체의 필요에 대한 목회적 응답으로 이해된다. Fee &amp; Stuart에게 복음서는 목회적 돌봄의 문서이다. 따라서 복음서 해석은 이 특정한 목회적 돌봄을 필요로 했던 공동체를 재구성하는 일을 요구한다.</p>\n<p>Osborne의 일차적 방법론 질문은 문학적이고 형식적이다. 이 본문은 하나의 통일된 내러티브 또는 시적 구조로서 어떻게 작동하는가? 그의 분석적 움직임은 본문의 내부 메커니즘에서 출발하여 독자를 향해 나아간다. 화자의 관점, 암시된 독자가 요구받는 자세, 플롯의 갈등 구조 — 이것들은 독자가 무엇을 받을 수 있는지를 형성하는 본문 내재적 특징들이다. Osborne은 본문을 자기 해석적 형식 체계로서 더 큰 권위를 부여한다.</p>\n<table><tr><th>차원</th><th>Fee &amp; Stuart</th><th>Osborne</th></tr><tr><td>일차 질문</td><td>이 공동체는 누구인가? 이 공동체는 어떤 긴장을 통과하고 있는가?</td><td>이 본문은 하나의 통일된 문학 구조로서 어떻게 작동하는가?</td></tr><tr><td>분석 방향</td><td>공동체 상황 → 구성 전략</td><td>본문의 형식 메커니즘 → 독자가 요구받는 자세</td></tr><tr><td>복음서 이해</td><td>특정 공동체를 위한 목회적 문서</td><td>내재적 해석 논리를 지닌 내러티브 전체</td></tr><tr><td>독자 이해</td><td>역사적/교회적 수준을 통과하는 공동체 구성원</td><td>본문의 내러티브 설계에 의해 위치 지워지는 암시된 독자</td></tr><tr><td>일차 도구</td><td>수평/수직 읽기, 두 수준 방법</td><td>내러티브 비평, 세밀한 읽기, 장르 분석</td></tr><tr><td>형식 처리</td><td>목회적 전략으로서의 형식: 선택, 배열, 적응</td><td>신학적 논증으로서의 형식: 화자, 플롯, 평행법</td></tr><tr><td>하나님 나라 틀</td><td>종말론적 토대로서의 하나님 나라, 그러나 마지막에 등장</td><td>탄식 구조를 통해 지도화된 종말론적 긴장</td></tr><tr><td>성경 본문</td><td>누가복음 15:1–2, 11–32, 내러티브 비유</td><td>시편 22:1–24 + 마가복음 15:34, 탄식 + 상호본문적 인용</td></tr></table>\n<h3>2.2 신학적 강조: 선포 vs. 임재</h3>\n<p>Fee &amp; Stuart의 하나님 나라 틀은 선포를 중심으로 한다. 복음서는 역사 속으로 침입해 들어오는 하나님의 역동적 통치를 선포한다. 해석자의 과제는 그 선포를 두 수준의 역사적-교회적 맥락 안에서 위치시키는 것이다. 신학적 주장은 은혜가 언제나 먼저라는 것이다. “은혜가 윤리에 선행한다.” 복음서 읽기는 그 선포를 받아들이고 그것에 의해 형성되는 행위이다. 아버지는 아들이 자신의 준비된 말을 끝내기 전에 달려간다.</p>\n<p>Osborne의 틀은, 특히 탄식 장르를 통해, 임재를 중심으로 한다. 본문의 일차적 요구는 선포가 아니라 거주이다. 해석자는 해결을 향해 서두르지 않고 탄식 형식 안에 머물도록 부름받는다. 곧 1절, “나의 하나님, 어찌하여 나를 버리셨나이까?”를 충분히 오래 붙들어야 하며, 24절, “그는 고난 받는 자의 고통을 멸시하거나 싫어하지 않으셨다”에 탄식 자체가 정한 속도로 도달해야 한다. 신학적 주장은 버림받음의 외침이 믿음의 붕괴가 아니라는 것이다. 그 외침 자체가 믿음이다. 형식과 함께 머무는 것이 곧 신학적 행위이다.</p>\n<p>이 두 강조는 서로 모순되지 않는다. 그러나 서로 다른 목회적 본능을 만들어 낸다. Fee &amp; Stuart는 해석자로 하여금 이렇게 묻게 만든다. “이 본문에서 하나님 나라는 무엇을 선포하고 있는가? 그리고 그 소속의 구조적 경제는 나의 공동체를 어떻게 재형성하는가?” Osborne은 해석자로 하여금 이렇게 묻게 만든다. “나는 형식을 서둘러 지나가고 있는가? 나는 공동체가 탄식 안에 충분히 오래 머물도록 허용하고 있는가, 그래서 무언가 새로운 것이 출현할 수 있게 하고 있는가?” 첫 번째는 선포의 논리이고, 두 번째는 임재의 논리이다. 둘 다 필요하다.</p>\n<h3>2.3 장 내부 긴장: 순서 vs. 상호의존성</h3>\n<p>Fee &amp; Stuart의 가장 생산적인 내부 긴장은 구조적이다. 복음서 해석의 필수적 열쇠로 장이 규정하는 하나님 나라 틀이 역사적 방법과 문학적 방법이 소개된 뒤 마지막에 등장한다. 이것은 교육학적 역설을 만든다. 모든 것을 떠받치는 방법이 기초가 아니라 결론처럼 나타나는 것이다. 교수자는 장의 순서를 그대로 가르칠 것인지, 곧 방법을 먼저 제시하고 틀을 마지막에 제시할 것인지, 아니면 그것을 뒤집어 가르칠 것인지 결정해야 한다.</p>\n<p>Osborne의 가장 생산적인 내부 긴장은 존재론적이다. 역사와 문학적 예술성은 상호의존적이라고 말하지만, 장은 그 관계를 최종적으로 판정하지 않는다. 역사가 문학적 해석을 제약하는가, 아니면 문학적 형식이 신학적으로 중요한 역사를 생산하는가? 이것은 순서의 문제가 아니라, 성경 본문이 어떤 종류의 실재인가에 관한 기초적 인식론의 문제이다.</p>\n<p>두 긴장을 함께 취하면 올바른 교육학적 질문이 만들어진다. 무엇이 우선하는가? 공동체의 상황인가, Fee &amp; Stuart의 관점에서 본 하나님 나라의 도래인가, Osborne이 강조하는 본문의 문학 구조인가, 아니면 Osborne의 반대 압력으로서 본문이 해석한다고 주장하는 역사인가? 통합된 대답 — 어느 한 원고만으로는 줄 수 없는 대답 — 은 이 네 가지 모두가 상호구성적이라는 것이다. 형성 해석학은 이 모두를 함께 붙든다.</p>\n<h3>2.4 독자의 WHERE의 발생</h3>\n<p>두 원고는 모두 독자의 WHERE를 방법의 경계로 식별한다. 그러나 서로 다른 방향에서 그곳에 도달하기 때문에 형성 안내자에게 서로 다른 실제적 함의를 제공한다.</p>\n<p>Fee &amp; Stuart의 버전은 이렇다. 독자가 already/not yet 장 안에서 차지하는 구조적 위치 — 곧 상대적 안정이라는 “already”에 있는가, 구조적 배제라는 “not yet”에 있는가 — 는 하나님 나라 선포가 그 사람 안에서 무엇을 하는지를 결정한다. 그 방법은 이것을 설명하지 못한다. 형성적 보충은 다음을 명명해야 한다. 이 독자는 비유의 관계적 장에서 어떤 위치, 곧 작은아들 / 큰아들 / 아버지 / 바리새인의 위치 중 어디에서 하나님 나라를 만나고 있는가?</p>\n<p>Osborne의 버전은 이렇다. 독자의 실제 언약적, 이데올로기적, 실존적, 문화적 위치는 암시된 독자 구성물 밖에 남겨진다. 형성적 보충은 다음을 명명해야 한다. 탄식의 WHERE는 이 독자의 구조적 WHERE에 대해 무엇을 드러내는가? 그들은 시편 22편을 학문적 거리의 위치에서 읽고 있는가, 아니면 아직 이름 붙일 수 없는 탄식 안에서 읽고 있는가?</p>\n<p>Fee &amp; Stuart의 WHERE는 주로 사회-구조적이다. 곧 소속의 경제 안에서의 위치이다. Osborne의 WHERE는 주로 실존-언약적이다. 곧 탄식 장 안에서의 위치이다. 7-WHERE Protocol에서 발전된 통합적 WHERE 질문은 이 둘을 동시에 붙든다.</p></div></details></div>"}, {"id": "part34", "label_en": "Parts 3–4 + Closure", "label_ko": "Part 3–4 + 마무리", "en": "<div class=\"card manuscript\"><h2>English Manuscript · Parts 3–4 + Closure</h2><details open class=\"doc-details\"><summary>PART 3 — INTEGRATION</summary><div class=\"doc-body\"><h2>PART 3 — INTEGRATION</h2>\n<h3>3.1 The Integrated Claim: Two Instruments, One Formation</h3>\n<p>Fee &amp; Stuart equips the interpreter to read how the text is doing something for a specific community. Osborne equips the interpreter to read how the text is doing something through its formal architecture. The integrated claim is this: responsible Gospel hermeneutics requires both instruments simultaneously — knowing what the text is doing (Osborne&#x27;s how) and knowing who the text is doing it for and why (Fee &amp; Stuart&#x27;s what-for). Neither is sufficient without the other.</p>\n<p>Applied to the lectures&#x27; specific texts: Mark 15:34&#x27;s citation of Psalm 22:1 is simultaneously a literary act (Osborne&#x27;s narrative criticism reveals that the narrator positions the implied reader inside an irony the bystanders missed) and a pastoral act (Fee &amp; Stuart&#x27;s ecclesial level reveals that Mark&#x27;s community needed to know that dereliction does not end the covenant). The irony only works if you know the lament structure (Osborne). The pastoral claim only matters if you know the community&#x27;s suffering (Fee &amp; Stuart). Both together produce what neither produces alone.</p>\n<h3>3.2 The Integration Point: Topological Reading</h3>\n<p>The integration is not additive (Fee &amp; Stuart first, then Osborne) but topological — both methods are applied simultaneously to the same relational field. The 2×3 Matrix Field names this: the text produces a Constitutive In-Between in which the reader is held between historical-communal distance (Fee &amp; Stuart&#x27;s two levels) and literary-existential immediacy (Osborne&#x27;s implied reader). Neither pole collapses into the other. The both/and is the hermeneutical condition.</p>\n<p>Luke 15 read topologically: the parable is simultaneously a kingdom demonstration about the structural conditions of belonging (Fee &amp; Stuart&#x27;s ecclesial level) and a narrative that positions the reader inside the father&#x27;s economy of restoration through plot and implied reader design (Osborne&#x27;s narrative criticism). The reader who holds both is reading the parable as a relational topology, not as a moral lesson.</p>\n<p>Psalm 22 / Mark 15:34 read topologically: the lament is simultaneously a genre-structured form that holds covenant address and experienced dereliction in the Constitutive In-Between (Osborne&#x27;s Hebrew poetry hermeneutics) and a pastoral document that tells a community: what looks like abandonment is citation; what sounds like despair is covenant (Fee &amp; Stuart&#x27;s ecclesial level applied cross-textually). The reader who holds both is reading the intertextual citation as a relational-spatial act, not as a proof-text.</p>\n<h3>3.3 Integration Matrix: Shared WHERE-WHO-WHAT</h3>\n<p>The shared WHERE-WHO-WHAT spine reveals the integration point most clearly.</p>\n<table><tr><th>Layer</th><th>Fee &amp; Stuart (Luke 15)</th><th>Osborne (Psalm 22 / Mark 15:34)</th><th>Integrated Reading</th></tr><tr><td>WHERE</td><td>Contested threshold between merit-logic and kingdom-belonging; the father&#x27;s doorway as structural arrangement</td><td>The Constitutive In-Between of lament: covenant address sustained inside experienced dereliction</td><td>The relational field where communal belonging and existential dereliction co-exist — where the community discovers whether it will hold the door open or require the prepared speech</td></tr><tr><td>WHO (prior)</td><td>The single-level reader extracting moral examples; the merit-logic student who does not yet see the older son&#x27;s economy</td><td>The analytical student trained to extract method and apply it; the form-bypassing reader who rushes past the lament to reach the application</td><td>The interpreter who holds only one instrument — either community-focus or text-focus — without recognizing that both are required simultaneously</td></tr><tr><td>WHO (nascent)</td><td>The kingdom interpreter who recognizes the structural economy of belonging and asks: which position in the parable&#x27;s field do I occupy?</td><td>The presence-capable interpreter who can inhabit the lament form without rushing toward resolution; who knows the cry is the faith</td><td>The formation interpreter who holds both — knowing how the text works (Osborne) and what it is doing for a community in a specific relational field (Fee &amp; Stuart), and who can name their own WHERE inside both reading frames</td></tr><tr><td>WHAT</td><td>Build communities organized by the father&#x27;s economy rather than the older son&#x27;s merit-logic; ask: where is the door still closed?</td><td>Be present to those whose cry is real; hold the lament form open at the pace it sets; guide from v.1 to v.24 without rushing</td><td>Practice a hermeneutic that simultaneously asks: what is this text announcing for this community (proclamation-logic)? and: are we inhabiting the form long enough for something to emerge (presence-logic)?</td></tr></table>\n<h3>3.4 Integrated Method Boundary: The 7-WHERE Supplement</h3>\n<p>Both manuscripts leave the reader&#x27;s WHERE at the method boundary. The integrated supplement — supplied by the 7-WHERE Protocol — names what neither method alone can produce: the actual reader&#x27;s sevenfold situatedness (Physical / Relational / Existential / Covenantal / Spiritual / Cultural / Ideological) as the formation field that both methods address but neither method enters.</p>\n<p>Applied integration: The instructor who uses both manuscripts in sequence (Osborne preceding or following Fee &amp; Stuart) creates a double method-boundary moment. Students encounter the limit of narrative criticism (Osborne) and the limit of ecclesial-pastoral hermeneutics (Fee &amp; Stuart) in the same unit. The formation supplement runs the 7-WHERE diagnostic at the intersection of both limits. This is not remediation of the methods — it is the formation step the methods themselves prepare.</p>\n<h3>3.5 Cruciform Spiral: From Both Manuscripts to Formation Permanence</h3>\n<p>The integrated formation permanence — what the student carries forward from the combined lectures — is this: they now possess two non-interchangeable instruments, and they know that every responsible Gospel reading requires both simultaneously. They cannot return to single-instrument interpretation. More precisely: they have crossed the threshold from information-extraction hermeneutics to formation hermeneutics. That crossing is a KAIROS event, not a methodological upgrade.</p>\n<p>The Cruciform Spiral maps the crossing as follows: the student enters both lectures from the Emic HOME of prior single-level reading (Stage 1: the both/and has not yet been opened). Each method opens one axis of the Transitional Space — Fee &amp; Stuart opens the historical-communal axis; Osborne opens the literary-existential axis. The integration holds both axes simultaneously, producing the both/and condition in which a new interpreter identity becomes possible. Formation Permanence locks the crossing: they cannot return to single-axis reading. The nascent WHO they are becoming — the interpreter who holds community and form simultaneously — is named not at the destination but from within the crossing.</p>\n<h3>3.6 Classroom Coordination Protocol</h3>\n<p>For sequential use of both manuscripts in the BH course, the following sequence is recommended:</p>\n<p>Session A (Fee &amp; Stuart): Introduce two-level method, compositional strategies, kingdom framework. Close with Method Boundary and WHERE-WHO-WHAT applied to Luke 15. Etic Questions push toward communal belonging structures.</p>\n<p>Session B (Osborne): Introduce narrative criticism and Hebrew poetry hermeneutics. Close with Method Boundary and WHERE-WHO-WHAT applied to Psalm 22 / Mark 15:34. Etic Questions push toward presence with those in the lament field.</p>\n<p>Integration Session (this document): Run the integration matrix. Students write a synthesis statement that begins with their WHERE, uses both vocabularies (two-level / implied reader), and names what each instrument alone cannot produce.</p>\n<p>Etic Questions for Integration: (1) In your community&#x27;s preaching and pastoral practice — are you using proclamation-logic (Fee &amp; Stuart) or presence-logic (Osborne) predominantly? What would it look like to hold both? (2) Where is the kingdom being announced in your context — and who is holding the lament form open for those who are in verse 1 and cannot yet reach verse 24 at the pace they need? (3) Name one specific interpretive decision — a sermon, a pastoral conversation, a teaching choice — that would look different if you used both instruments simultaneously.</p></div></details><details  class=\"doc-details\"><summary>PART 4 — SUMMARY: SIMILARITY / DIFFERENCE / INTEGRATION AT A GLANCE</summary><div class=\"doc-body\"><h2>PART 4 — SUMMARY: SIMILARITY / DIFFERENCE / INTEGRATION AT A GLANCE</h2>\n<table><tr><th>Category</th><th>Fee &amp; Stuart</th><th>Osborne</th><th>Integrated</th></tr><tr><td>Core claim</td><td>The Gospels operate on two levels; the kingdom is the interpretive ground</td><td>Form carries theological argument; narrative criticism and genre analysis reveal textual claim</td><td>Both levels and both instruments required; form and community are co-constitutive</td></tr><tr><td>Primary text</td><td>Luke 15:1–2, 11–32 (Parable of the Prodigal Son)</td><td>Psalm 22:1–24 + Mark 15:34 (Lament + intertextual citation)</td><td>The parable and the lament read as topological pair: kingdom announcement inside dereliction field</td></tr><tr><td>Method</td><td>Two-level (historical/ecclesial) + selectivity/arrangement/adaptation + horizontal/vertical reading</td><td>Narrative criticism (narrator, implied reader, plot) + Hebrew poetry (parallelism, lament structure, strophic patterns)</td><td>Topological reading: both instruments applied simultaneously to the same relational field</td></tr><tr><td>Theological emphasis</td><td>Grace precedes ethics; proclamation-logic; the father runs</td><td>Presence-logic; cry is the faith; hold the lament form</td><td>Proclamation without presence is premature; presence without proclamation is formless. Both together.</td></tr><tr><td>Shared feature 1</td><td>Form carries meaning</td><td>Form carries meaning</td><td>Non-negotiable: form is the theology, not its container</td></tr><tr><td>Shared feature 2</td><td>Already/not yet as reader&#x27;s condition</td><td>Already/not yet as lament&#x27;s structure</td><td>Eschatological tension is simultaneously communal and existential</td></tr><tr><td>Shared feature 3</td><td>Method boundary: reader&#x27;s WHERE unnamed</td><td>Method boundary: reader&#x27;s WHERE unnamed</td><td>7-WHERE Protocol supplies what both methods leave open</td></tr><tr><td>Difference 1</td><td>Community → text (inward)</td><td>Text → reader (outward)</td><td>Co-directional: both movements required</td></tr><tr><td>Difference 2</td><td>Kingdom appears last (pedagogical paradox)</td><td>History and form interdependent (epistemological tension)</td><td>Integration holds the paradox: kingdom grounds method; form produces history that matters</td></tr><tr><td>Formation permanence</td><td>Cannot return to merit-logic reading or single-level extraction</td><td>Cannot return to form-bypassing or rush-to-application reading</td><td>Cannot return to single-instrument interpretation: both methods are now constitutive of the interpreter&#x27;s identity</td></tr></table>\n<h3>SOCRATIC-KENOTIC CLOSURE — ETic Questions</h3>\n<p>These questions are for the integration session. They are formation questions — not rhetorical. They do not have answers you can write down in advance.</p>\n<p class=\"indent\">1. Fee &amp; Stuart teaches that grace is always prior — the father runs before the prepared speech is finished. Osborne teaches that the lament must be inhabited before it is resolved. In your actual preaching, teaching, or pastoral practice: which logic is dominant — proclamation or presence? What would it cost your community to hold both simultaneously?</p>\n<p class=\"indent\">2. Both manuscripts name the same boundary: the reader&#x27;s WHERE is left outside the method. In your community, in your church, in your institution — from which structural position in the already/not yet field are you actually reading? Are you in the &#x27;already&#x27; of academic security or communal stability? Are you in the &#x27;not yet&#x27; of a lament that has not yet been named? Name it honestly. Not as confession. As diagnostic.</p>\n<p class=\"indent\">3. The integrated WHERE question: Where is God&#x27;s gaze resting right now — on whom, in which field, in which lament? Is your community structured to run toward that space (Fee &amp; Stuart&#x27;s father-economy), and is it willing to remain in that space long enough for something to emerge (Osborne&#x27;s lament-inhabitation)? Name a specific person, a specific community, a specific decision that has not yet been made.</p></div></details></div>", "ko": "<div class=\"card manuscript\"><h2>한국어 원고 · Part 3–4 + 마무리</h2><details open class=\"doc-details\"><summary>PART 3 — 통합</summary><div class=\"doc-body\"><h2>PART 3 — 통합</h2>\n<h3>3.1 통합된 주장: 두 악기, 하나의 형성</h3>\n<p>Fee &amp; Stuart는 해석자가 본문이 특정 공동체를 위해 무엇을 하고 있는지를 읽을 수 있도록 장비시킨다. Osborne은 해석자가 본문이 자신의 형식적 아키텍처를 통해 무엇을 하고 있는지를 읽을 수 있도록 장비시킨다. 통합된 주장은 이것이다. 책임 있는 복음서 해석학은 두 악기를 동시에 요구한다. 곧 본문이 무엇을 하고 있는지, Osborne의 “어떻게”를 아는 것과, 본문이 누구를 위해 왜 그것을 하고 있는지, Fee &amp; Stuart의 “무엇을 위해”를 아는 것이다. 어느 하나도 다른 하나 없이 충분하지 않다.</p>\n<p>강의의 특정 본문들에 적용하면 이렇다. 마가복음 15:34의 시편 22:1 인용은 동시에 문학적 행위이다. Osborne의 내러티브 비평은 화자가 암시된 독자를 방관자들이 놓친 아이러니 안으로 위치시킨다는 것을 드러낸다. 동시에 그것은 목회적 행위이다. Fee &amp; Stuart의 교회적 수준은 마가의 공동체가 버림받음이 언약을 끝내지 않는다는 것을 알아야 했음을 드러낸다. 그 아이러니는 탄식 구조를 알아야만 작동한다. 이것이 Osborne이다. 그 목회적 주장은 공동체의 고난을 알아야만 중요해진다. 이것이 Fee &amp; Stuart이다. 둘이 함께할 때, 어느 하나만으로는 생산할 수 없는 것을 생산한다.</p>\n<h3>3.2 통합 지점: 위상학적 읽기</h3>\n<p>통합은 더하기 방식이 아니다. 곧 Fee &amp; Stuart를 먼저 하고 그다음 Osborne을 하는 식이 아니다. 통합은 위상학적이다. 두 방법은 동일한 관계적 장에 동시에 적용된다. 2×3 Matrix Field가 이것을 명명한다. 본문은 독자를 역사적-공동체적 거리, 곧 Fee &amp; Stuart의 두 수준과 문학적-실존적 즉시성, 곧 Osborne의 암시된 독자 사이에 붙들어 두는 Constitutive In-Between을 생산한다. 어느 한 극도 다른 극으로 붕괴되지 않는다. 이 both/and가 해석학적 조건이다.</p>\n<p>누가복음 15장을 위상학적으로 읽으면 이렇다. 그 비유는 동시에 소속의 구조적 조건에 관한 하나님 나라의 시연이다. 이것은 Fee &amp; Stuart의 교회적 수준이다. 또한 그것은 플롯과 암시된 독자 설계를 통해 독자를 아버지의 회복 경제 안에 위치시키는 내러티브이다. 이것은 Osborne의 내러티브 비평이다. 둘을 함께 붙드는 독자는 그 비유를 도덕적 교훈이 아니라 관계적 위상학으로 읽고 있는 것이다.</p>\n<p>시편 22편 / 마가복음 15:34를 위상학적으로 읽으면 이렇다. 탄식은 동시에 언약적 부름과 경험된 버림받음을 Constitutive In-Between 안에 붙들어 두는 장르 구조화된 형식이다. 이것은 Osborne의 히브리 시 해석학이다. 또한 그것은 공동체에게 이렇게 말하는 목회적 문서이다. 버림받음처럼 보이는 것은 인용이다. 절망처럼 들리는 것은 언약이다. 이것은 Fee &amp; Stuart의 교회적 수준을 본문 간 읽기에 적용한 것이다. 둘을 함께 붙드는 독자는 상호본문적 인용을 증거 본문이 아니라 관계적-공간적 행위로 읽고 있는 것이다.</p>\n<h3>3.3 통합 매트릭스: 공유된 WHERE-WHO-WHAT</h3>\n<p>공유된 WHERE-WHO-WHAT 척추는 통합 지점을 가장 분명하게 드러낸다.</p>\n<table><tr><th>층위</th><th>Fee &amp; Stuart — 누가복음 15장</th><th>Osborne — 시편 22편 / 마가복음 15:34</th><th>통합적 읽기</th></tr><tr><td>WHERE</td><td>공로 논리와 하나님 나라의 소속 사이의 논쟁적 문턱. 구조적 배열로서의 아버지의 문간</td><td>탄식의 Constitutive In-Between. 경험된 버림받음 안에서 유지되는 언약적 부름</td><td>공동체적 소속과 실존적 버림받음이 공존하는 관계적 장. 공동체가 문을 열어 둘 것인지, 아니면 준비된 연설을 요구할 것인지를 발견하는 장소</td></tr><tr><td>WHO — 이전 자아</td><td>도덕적 예를 추출하는 단일 수준 독자. 아직 큰아들의 경제를 보지 못하는 공로 논리의 학생</td><td>방법을 추출하고 적용하도록 훈련된 분석적 학생. 탄식을 지나 적용에 도달하려고 서두르는 형식 우회적 독자</td><td>하나의 악기만 붙드는 해석자. 공동체 초점 또는 본문 초점 중 하나만 붙들고 둘이 동시에 필요하다는 것을 인식하지 못하는 해석자</td></tr><tr><td>WHO — 발생 중인 자아</td><td>소속의 구조적 경제를 인식하고 “나는 비유의 장 안에서 어떤 위치를 차지하고 있는가?”라고 묻는 하나님 나라 해석자</td><td>해결을 향해 서두르지 않고 탄식 형식 안에 거주할 수 있는 임재 가능한 해석자. 그 외침이 믿음임을 아는 해석자</td><td>둘을 함께 붙드는 형성 해석자. 본문이 어떻게 작동하는지, 곧 Osborne을 알고, 본문이 특정 관계적 장 안의 공동체를 위해 무엇을 하고 있는지, 곧 Fee &amp; Stuart를 알며, 두 읽기 틀 안에서 자신의 WHERE를 명명할 수 있는 해석자</td></tr><tr><td>WHAT</td><td>큰아들의 공로 논리가 아니라 아버지의 경제로 조직된 공동체를 세우기. “문은 어디에서 아직 닫혀 있는가?”라고 묻기</td><td>그 외침이 실제인 사람들에게 임재하기. 탄식 형식을 그 형식이 정한 속도로 열어 두기. 서두르지 않고 1절에서 24절로 인도하기</td><td>동시에 다음을 묻는 해석학을 실천하기. 이 본문은 이 공동체를 위해 무엇을 선포하고 있는가, 곧 선포의 논리? 그리고 우리는 무언가가 출현할 만큼 충분히 오래 형식 안에 거주하고 있는가, 곧 임재의 논리?</td></tr></table>\n<h3>3.4 통합된 방법 경계: 7-WHERE Supplement</h3>\n<p>두 원고는 모두 독자의 WHERE를 방법 경계에 남긴다. 통합적 보충, 곧 7-WHERE Protocol은 어느 한 방법만으로는 생산할 수 없는 것을 명명한다. 그것은 실제 독자의 일곱 겹의 위치성 — Physical / Relational / Existential / Covenantal / Spiritual / Cultural / Ideological — 을 형성의 장으로 명명한다. 두 방법은 이 장을 향해 말하지만, 어느 방법도 그 장 안으로 직접 들어가지는 않는다.</p>\n<p>적용된 통합은 이렇다. 두 원고를 순차적으로 사용하는 교수자, 곧 Osborne을 Fee &amp; Stuart 앞이나 뒤에 배치하는 교수자는 이중 방법-경계의 순간을 창조한다. 학생들은 동일한 단원 안에서 내러티브 비평의 한계, 곧 Osborne과 교회적-목회적 해석학의 한계, 곧 Fee &amp; Stuart를 모두 만난다. 형성적 보충은 두 한계가 교차하는 지점에서 7-WHERE 진단을 실행한다. 이것은 방법의 보수가 아니다. 이것은 방법들이 스스로 준비하는 형성 단계이다.</p>\n<h3>3.5 Cruciform Spiral: 두 원고에서 형성의 지속성으로</h3>\n<p>통합된 형성의 지속성 — 학생이 결합된 두 강의에서 앞으로 가져가는 것 — 은 이것이다. 그들은 이제 서로 대체할 수 없는 두 개의 악기를 소유하게 되었으며, 모든 책임 있는 복음서 읽기는 이 둘을 동시에 요구한다는 것을 알게 되었다. 그들은 단일 악기 해석으로 돌아갈 수 없다. 더 정확히 말하면, 그들은 정보 추출 해석학에서 형성 해석학으로 문턱을 건넜다. 그 crossing은 방법론적 업그레이드가 아니라 KAIROS 사건이다.</p>\n<p>Cruciform Spiral은 이 crossing을 다음과 같이 지도화한다. 학생은 이전의 단일 수준 읽기라는 Emic HOME에서 두 강의에 들어간다. 이것은 Stage 1이다. 아직 both/and는 열리지 않았다. 각 방법은 Transitional Space의 한 축을 연다. Fee &amp; Stuart는 역사적-공동체적 축을 열고, Osborne은 문학적-실존적 축을 연다. 통합은 두 축을 동시에 붙들어 새로운 해석자 정체성이 가능해지는 both/and 조건을 생산한다. Formation Permanence는 그 crossing을 잠근다. 학생들은 단일 축 읽기로 돌아갈 수 없다. 그들이 되어 가는 발생 중인 WHO — 공동체와 형식을 동시에 붙드는 해석자 — 는 목적지에서가 아니라 crossing 안에서 이름 붙여진다.</p>\n<h3>3.6 수업 조율 프로토콜</h3>\n<p>BH course에서 두 원고를 순차적으로 사용할 경우 다음 순서를 권장한다.</p>\n<div class=\"theme-box compact\"><p>Session A — Fee &amp; Stuart</p><p>두 수준 방법, 구성 전략, 하나님 나라 틀을 소개한다. 방법 경계와 WHERE-WHO-WHAT을 누가복음 15장에 적용하며 마무리한다. ETic Questions는 공동체적 소속 구조를 향해 밀어낸다.</p></div>\n<div class=\"theme-box compact\"><p>Session B — Osborne</p><p>내러티브 비평과 히브리 시 해석학을 소개한다. 방법 경계와 WHERE-WHO-WHAT을 시편 22편 / 마가복음 15:34에 적용하며 마무리한다. ETic Questions는 탄식의 장 안에 있는 이들과 함께하는 임재를 향해 밀어낸다.</p></div>\n<div class=\"theme-box compact\"><p>Integration Session — 이 문서</p><p>통합 매트릭스를 실행한다. 학생들은 자신의 WHERE에서 시작하고, 두 어휘, 곧 두 수준 / 암시된 독자를 사용하며, 각 악기만으로는 생산할 수 없는 것을 명명하는 종합 진술문을 작성한다.</p></div>\n<div class=\"theme-box compact\"><p>통합을 위한 ETic Questions</p><p>(1) 당신의 공동체의 설교와 목회 실천 안에서 — 당신은 주로 선포의 논리, 곧 Fee &amp; Stuart를 사용하고 있는가, 아니면 임재의 논리, 곧 Osborne을 사용하고 있는가? 둘을 함께 붙든다는 것은 어떤 모습일까?</p><p>(2) 당신의 맥락에서 하나님 나라는 어디에서 선포되고 있는가? 그리고 1절 안에 있으며 아직 자신에게 필요한 속도로 24절에 도달할 수 없는 이들을 위해 누가 탄식의 형식을 열어 두고 있는가?</p><p>(3) 설교, 목회적 대화, 가르침의 선택 중 하나의 구체적 해석 결정을 이름 붙여 보라. 두 악기를 동시에 사용한다면 그 결정은 어떻게 달라질 것인가?</p></div></div></details><details  class=\"doc-details\"><summary>PART 4 — 요약: 유사성 / 차이점 / 통합 한눈에 보기</summary><div class=\"doc-body\"><h2>PART 4 — 요약: 유사성 / 차이점 / 통합 한눈에 보기</h2>\n<table><tr><th>범주</th><th>Fee &amp; Stuart</th><th>Osborne</th><th>통합</th></tr><tr><td>핵심 주장</td><td>복음서는 두 수준에서 작동한다. 하나님 나라는 해석의 토대이다.</td><td>형식은 신학적 논증을 운반한다. 내러티브 비평과 장르 분석은 본문의 주장을 드러낸다.</td><td>두 수준과 두 악기 모두 필요하다. 형식과 공동체는 상호구성적이다.</td></tr><tr><td>일차 본문</td><td>누가복음 15:1–2, 11–32, 탕자의 비유</td><td>시편 22:1–24 + 마가복음 15:34, 탄식 + 상호본문적 인용</td><td>비유와 탄식은 위상학적 쌍으로 읽힌다. 버림받음의 장 안에서 하나님 나라 선포</td></tr><tr><td>방법</td><td>두 수준, 역사적/교회적 + 선택/배열/적응 + 수평/수직 읽기</td><td>내러티브 비평, 화자, 암시된 독자, 플롯 + 히브리 시, 평행법, 탄식 구조, 연 구성</td><td>위상학적 읽기. 두 악기가 동일한 관계적 장에 동시에 적용된다.</td></tr><tr><td>신학적 강조</td><td>은혜가 윤리에 선행한다. 선포의 논리. 아버지는 달려간다.</td><td>임재의 논리. 외침은 믿음이다. 탄식 형식을 붙들어라.</td><td>임재 없는 선포는 성급하다. 선포 없는 임재는 형식이 없다. 둘이 함께 필요하다.</td></tr><tr><td>공유 특징 1</td><td>형식은 의미를 운반한다.</td><td>형식은 의미를 운반한다.</td><td>타협 불가능한 주장: 형식은 신학의 용기가 아니라 신학 자체이다.</td></tr><tr><td>공유 특징 2</td><td>Already/not yet은 독자의 조건이다.</td><td>Already/not yet은 탄식의 구조이다.</td><td>종말론적 긴장은 동시에 공동체적이고 실존적이다.</td></tr><tr><td>공유 특징 3</td><td>방법 경계: 독자의 WHERE가 명명되지 않는다.</td><td>방법 경계: 독자의 WHERE가 명명되지 않는다.</td><td>7-WHERE Protocol은 두 방법이 열어 두는 것을 보충한다.</td></tr><tr><td>차이 1</td><td>공동체 → 본문, 안으로 향함</td><td>본문 → 독자, 밖으로 향함</td><td>양방향적이다. 두 움직임 모두 필요하다.</td></tr><tr><td>차이 2</td><td>하나님 나라가 마지막에 등장한다. 교육학적 역설</td><td>역사와 형식이 상호의존한다. 인식론적 긴장</td><td>통합은 그 역설을 붙든다. 하나님 나라가 방법의 토대이고, 형식은 신학적으로 중요한 역사를 생산한다.</td></tr><tr><td>형성의 지속성</td><td>공로 논리 읽기나 단일 수준 추출로 돌아갈 수 없다.</td><td>형식 우회나 적용으로 서두르는 읽기로 돌아갈 수 없다.</td><td>단일 악기 해석으로 돌아갈 수 없다. 두 방법은 이제 해석자의 정체성을 구성한다.</td></tr></table>\n<h3>SOCRATIC-KENOTIC CLOSURE — ETic Questions</h3>\n<p>이 질문들은 통합 세션을 위한 것이다. 이것들은 형성 질문이지 수사적 질문이 아니다. 미리 적어 둘 수 있는 답이 있는 질문들이 아니다.</p>\n<p>1.</p>\n<p>Fee &amp; Stuart는 은혜가 언제나 먼저라고 가르친다. 아버지는 준비된 말이 끝나기 전에 달려간다. Osborne은 탄식이 해결되기 전에 그 안에 거주해야 한다고 가르친다. 당신의 실제 설교, 가르침, 또는 목회 실천 안에서 어떤 논리가 지배적인가 — 선포인가, 임재인가? 당신의 공동체가 둘을 동시에 붙들기 위해서는 어떤 대가를 치러야 하는가?</p>\n<p>2.</p>\n<p>두 원고는 동일한 경계를 명명한다. 독자의 WHERE는 방법 밖에 남겨진다. 당신의 공동체 안에서, 당신의 교회 안에서, 당신의 기관 안에서 — 당신은 already/not yet 장 안의 어떤 구조적 위치에서 실제로 읽고 있는가? 당신은 학문적 안전이나 공동체적 안정이라는 “already” 안에 있는가? 아니면 아직 이름 붙여지지 않은 탄식이라는 “not yet” 안에 있는가? 정직하게 이름 붙이라. 고백으로서가 아니라 진단으로서.</p>\n<p>3.</p>\n<p>통합된 WHERE 질문은 이것이다. 지금 하나님의 시선은 어디에 머물고 있는가 — 누구에게, 어떤 장 안에, 어떤 탄식 안에? 당신의 공동체는 그 공간을 향해 달려가도록 구조화되어 있는가, 곧 Fee &amp; Stuart의 아버지 경제인가? 그리고 그 공동체는 무언가가 출현할 만큼 충분히 오래 그 공간 안에 머물 의지가 있는가, 곧 Osborne의 탄식 거주인가? 아직 내려지지 않은 하나의 구체적 사람, 하나의 구체적 공동체, 하나의 구체적 결정을 이름 붙이라.</p></div></details></div>"}]}, {"id": "formation", "label_en": "Formation Manuscript", "label_ko": "형성 원고", "subtabs": [{"id": "protocol", "label_en": "Classroom Protocol", "label_ko": "수업 조율 프로토콜", "en": "<div class=\"card\"><h2>Classroom coordination protocol</h2><h3>3.6 Classroom Coordination Protocol</h3>\n<p>For sequential use of both manuscripts in the BH course, the following sequence is recommended:</p>\n<p>Session A (Fee &amp; Stuart): Introduce two-level method, compositional strategies, kingdom framework. Close with Method Boundary and WHERE-WHO-WHAT applied to Luke 15. Etic Questions push toward communal belonging structures.</p>\n<p>Session B (Osborne): Introduce narrative criticism and Hebrew poetry hermeneutics. Close with Method Boundary and WHERE-WHO-WHAT applied to Psalm 22 / Mark 15:34. Etic Questions push toward presence with those in the lament field.</p>\n<p>Integration Session (this document): Run the integration matrix. Students write a synthesis statement that begins with their WHERE, uses both vocabularies (two-level / implied reader), and names what each instrument alone cannot produce.</p>\n<p>Etic Questions for Integration: (1) In your community&#x27;s preaching and pastoral practice — are you using proclamation-logic (Fee &amp; Stuart) or presence-logic (Osborne) predominantly? What would it look like to hold both? (2) Where is the kingdom being announced in your context — and who is holding the lament form open for those who are in verse 1 and cannot yet reach verse 24 at the pace they need? (3) Name one specific interpretive decision — a sermon, a pastoral conversation, a teaching choice — that would look different if you used both instruments simultaneously.</p></div>", "ko": "<div class=\"card\"><h2>수업 조율 프로토콜</h2><h3>3.6 수업 조율 프로토콜</h3>\n<p>BH course에서 두 원고를 순차적으로 사용할 경우 다음 순서를 권장한다.</p>\n<div class=\"theme-box compact\"><p>Session A — Fee &amp; Stuart</p><p>두 수준 방법, 구성 전략, 하나님 나라 틀을 소개한다. 방법 경계와 WHERE-WHO-WHAT을 누가복음 15장에 적용하며 마무리한다. ETic Questions는 공동체적 소속 구조를 향해 밀어낸다.</p></div>\n<div class=\"theme-box compact\"><p>Session B — Osborne</p><p>내러티브 비평과 히브리 시 해석학을 소개한다. 방법 경계와 WHERE-WHO-WHAT을 시편 22편 / 마가복음 15:34에 적용하며 마무리한다. ETic Questions는 탄식의 장 안에 있는 이들과 함께하는 임재를 향해 밀어낸다.</p></div>\n<div class=\"theme-box compact\"><p>Integration Session — 이 문서</p><p>통합 매트릭스를 실행한다. 학생들은 자신의 WHERE에서 시작하고, 두 어휘, 곧 두 수준 / 암시된 독자를 사용하며, 각 악기만으로는 생산할 수 없는 것을 명명하는 종합 진술문을 작성한다.</p></div>\n<div class=\"theme-box compact\"><p>통합을 위한 ETic Questions</p><p>(1) 당신의 공동체의 설교와 목회 실천 안에서 — 당신은 주로 선포의 논리, 곧 Fee &amp; Stuart를 사용하고 있는가, 아니면 임재의 논리, 곧 Osborne을 사용하고 있는가? 둘을 함께 붙든다는 것은 어떤 모습일까?</p><p>(2) 당신의 맥락에서 하나님 나라는 어디에서 선포되고 있는가? 그리고 1절 안에 있으며 아직 자신에게 필요한 속도로 24절에 도달할 수 없는 이들을 위해 누가 탄식의 형식을 열어 두고 있는가?</p><p>(3) 설교, 목회적 대화, 가르침의 선택 중 하나의 구체적 해석 결정을 이름 붙여 보라. 두 악기를 동시에 사용한다면 그 결정은 어떻게 달라질 것인가?</p></div></div>"}, {"id": "closure", "label_en": "ETic Questions", "label_ko": "ETic Questions", "en": "<div class=\"card\"><h2>Socratic-Kenotic Closure</h2><h2>PART 4 — SUMMARY: SIMILARITY / DIFFERENCE / INTEGRATION AT A GLANCE</h2>\n<table><tr><th>Category</th><th>Fee &amp; Stuart</th><th>Osborne</th><th>Integrated</th></tr><tr><td>Core claim</td><td>The Gospels operate on two levels; the kingdom is the interpretive ground</td><td>Form carries theological argument; narrative criticism and genre analysis reveal textual claim</td><td>Both levels and both instruments required; form and community are co-constitutive</td></tr><tr><td>Primary text</td><td>Luke 15:1–2, 11–32 (Parable of the Prodigal Son)</td><td>Psalm 22:1–24 + Mark 15:34 (Lament + intertextual citation)</td><td>The parable and the lament read as topological pair: kingdom announcement inside dereliction field</td></tr><tr><td>Method</td><td>Two-level (historical/ecclesial) + selectivity/arrangement/adaptation + horizontal/vertical reading</td><td>Narrative criticism (narrator, implied reader, plot) + Hebrew poetry (parallelism, lament structure, strophic patterns)</td><td>Topological reading: both instruments applied simultaneously to the same relational field</td></tr><tr><td>Theological emphasis</td><td>Grace precedes ethics; proclamation-logic; the father runs</td><td>Presence-logic; cry is the faith; hold the lament form</td><td>Proclamation without presence is premature; presence without proclamation is formless. Both together.</td></tr><tr><td>Shared feature 1</td><td>Form carries meaning</td><td>Form carries meaning</td><td>Non-negotiable: form is the theology, not its container</td></tr><tr><td>Shared feature 2</td><td>Already/not yet as reader&#x27;s condition</td><td>Already/not yet as lament&#x27;s structure</td><td>Eschatological tension is simultaneously communal and existential</td></tr><tr><td>Shared feature 3</td><td>Method boundary: reader&#x27;s WHERE unnamed</td><td>Method boundary: reader&#x27;s WHERE unnamed</td><td>7-WHERE Protocol supplies what both methods leave open</td></tr><tr><td>Difference 1</td><td>Community → text (inward)</td><td>Text → reader (outward)</td><td>Co-directional: both movements required</td></tr><tr><td>Difference 2</td><td>Kingdom appears last (pedagogical paradox)</td><td>History and form interdependent (epistemological tension)</td><td>Integration holds the paradox: kingdom grounds method; form produces history that matters</td></tr><tr><td>Formation permanence</td><td>Cannot return to merit-logic reading or single-level extraction</td><td>Cannot return to form-bypassing or rush-to-application reading</td><td>Cannot return to single-instrument interpretation: both methods are now constitutive of the interpreter&#x27;s identity</td></tr></table>\n<h3>SOCRATIC-KENOTIC CLOSURE — ETic Questions</h3>\n<p>These questions are for the integration session. They are formation questions — not rhetorical. They do not have answers you can write down in advance.</p>\n<p class=\"indent\">1. Fee &amp; Stuart teaches that grace is always prior — the father runs before the prepared speech is finished. Osborne teaches that the lament must be inhabited before it is resolved. In your actual preaching, teaching, or pastoral practice: which logic is dominant — proclamation or presence? What would it cost your community to hold both simultaneously?</p>\n<p class=\"indent\">2. Both manuscripts name the same boundary: the reader&#x27;s WHERE is left outside the method. In your community, in your church, in your institution — from which structural position in the already/not yet field are you actually reading? Are you in the &#x27;already&#x27; of academic security or communal stability? Are you in the &#x27;not yet&#x27; of a lament that has not yet been named? Name it honestly. Not as confession. As diagnostic.</p>\n<p class=\"indent\">3. The integrated WHERE question: Where is God&#x27;s gaze resting right now — on whom, in which field, in which lament? Is your community structured to run toward that space (Fee &amp; Stuart&#x27;s father-economy), and is it willing to remain in that space long enough for something to emerge (Osborne&#x27;s lament-inhabitation)? Name a specific person, a specific community, a specific decision that has not yet been made.</p></div>", "ko": "<div class=\"card\"><h2>Socratic-Kenotic Closure</h2><h2>PART 4 — 요약: 유사성 / 차이점 / 통합 한눈에 보기</h2>\n<table><tr><th>범주</th><th>Fee &amp; Stuart</th><th>Osborne</th><th>통합</th></tr><tr><td>핵심 주장</td><td>복음서는 두 수준에서 작동한다. 하나님 나라는 해석의 토대이다.</td><td>형식은 신학적 논증을 운반한다. 내러티브 비평과 장르 분석은 본문의 주장을 드러낸다.</td><td>두 수준과 두 악기 모두 필요하다. 형식과 공동체는 상호구성적이다.</td></tr><tr><td>일차 본문</td><td>누가복음 15:1–2, 11–32, 탕자의 비유</td><td>시편 22:1–24 + 마가복음 15:34, 탄식 + 상호본문적 인용</td><td>비유와 탄식은 위상학적 쌍으로 읽힌다. 버림받음의 장 안에서 하나님 나라 선포</td></tr><tr><td>방법</td><td>두 수준, 역사적/교회적 + 선택/배열/적응 + 수평/수직 읽기</td><td>내러티브 비평, 화자, 암시된 독자, 플롯 + 히브리 시, 평행법, 탄식 구조, 연 구성</td><td>위상학적 읽기. 두 악기가 동일한 관계적 장에 동시에 적용된다.</td></tr><tr><td>신학적 강조</td><td>은혜가 윤리에 선행한다. 선포의 논리. 아버지는 달려간다.</td><td>임재의 논리. 외침은 믿음이다. 탄식 형식을 붙들어라.</td><td>임재 없는 선포는 성급하다. 선포 없는 임재는 형식이 없다. 둘이 함께 필요하다.</td></tr><tr><td>공유 특징 1</td><td>형식은 의미를 운반한다.</td><td>형식은 의미를 운반한다.</td><td>타협 불가능한 주장: 형식은 신학의 용기가 아니라 신학 자체이다.</td></tr><tr><td>공유 특징 2</td><td>Already/not yet은 독자의 조건이다.</td><td>Already/not yet은 탄식의 구조이다.</td><td>종말론적 긴장은 동시에 공동체적이고 실존적이다.</td></tr><tr><td>공유 특징 3</td><td>방법 경계: 독자의 WHERE가 명명되지 않는다.</td><td>방법 경계: 독자의 WHERE가 명명되지 않는다.</td><td>7-WHERE Protocol은 두 방법이 열어 두는 것을 보충한다.</td></tr><tr><td>차이 1</td><td>공동체 → 본문, 안으로 향함</td><td>본문 → 독자, 밖으로 향함</td><td>양방향적이다. 두 움직임 모두 필요하다.</td></tr><tr><td>차이 2</td><td>하나님 나라가 마지막에 등장한다. 교육학적 역설</td><td>역사와 형식이 상호의존한다. 인식론적 긴장</td><td>통합은 그 역설을 붙든다. 하나님 나라가 방법의 토대이고, 형식은 신학적으로 중요한 역사를 생산한다.</td></tr><tr><td>형성의 지속성</td><td>공로 논리 읽기나 단일 수준 추출로 돌아갈 수 없다.</td><td>형식 우회나 적용으로 서두르는 읽기로 돌아갈 수 없다.</td><td>단일 악기 해석으로 돌아갈 수 없다. 두 방법은 이제 해석자의 정체성을 구성한다.</td></tr></table>\n<h3>SOCRATIC-KENOTIC CLOSURE — ETic Questions</h3>\n<p>이 질문들은 통합 세션을 위한 것이다. 이것들은 형성 질문이지 수사적 질문이 아니다. 미리 적어 둘 수 있는 답이 있는 질문들이 아니다.</p>\n<p>1.</p>\n<p>Fee &amp; Stuart는 은혜가 언제나 먼저라고 가르친다. 아버지는 준비된 말이 끝나기 전에 달려간다. Osborne은 탄식이 해결되기 전에 그 안에 거주해야 한다고 가르친다. 당신의 실제 설교, 가르침, 또는 목회 실천 안에서 어떤 논리가 지배적인가 — 선포인가, 임재인가? 당신의 공동체가 둘을 동시에 붙들기 위해서는 어떤 대가를 치러야 하는가?</p>\n<p>2.</p>\n<p>두 원고는 동일한 경계를 명명한다. 독자의 WHERE는 방법 밖에 남겨진다. 당신의 공동체 안에서, 당신의 교회 안에서, 당신의 기관 안에서 — 당신은 already/not yet 장 안의 어떤 구조적 위치에서 실제로 읽고 있는가? 당신은 학문적 안전이나 공동체적 안정이라는 “already” 안에 있는가? 아니면 아직 이름 붙여지지 않은 탄식이라는 “not yet” 안에 있는가? 정직하게 이름 붙이라. 고백으로서가 아니라 진단으로서.</p>\n<p>3.</p>\n<p>통합된 WHERE 질문은 이것이다. 지금 하나님의 시선은 어디에 머물고 있는가 — 누구에게, 어떤 장 안에, 어떤 탄식 안에? 당신의 공동체는 그 공간을 향해 달려가도록 구조화되어 있는가, 곧 Fee &amp; Stuart의 아버지 경제인가? 그리고 그 공동체는 무언가가 출현할 만큼 충분히 오래 그 공간 안에 머물 의지가 있는가, 곧 Osborne의 탄식 거주인가? 아직 내려지지 않은 하나의 구체적 사람, 하나의 구체적 공동체, 하나의 구체적 결정을 이름 붙이라.</p></div>"}, {"id": "statement", "label_en": "Synthesis Statement", "label_ko": "종합 진술문", "en": "\n<div class=\"card\">\n  <h2>Pre-class synthesis statement template</h2>\n  <p>Use this before class. Keep the statement concise but specific.</p>\n  <div class=\"callout\"><strong>Template:</strong> In this text, Fee & Stuart helps me see ______ because ______. Osborne helps me see ______ because ______. When held together, the text forms me to move from ______ toward ______.</div>\n  <label class=\"note-label\" for=\"noteA\">Draft your synthesis statement</label>\n  <textarea id=\"noteA\" placeholder=\"Write your synthesis statement here...\"></textarea>\n  <div class=\"btn-row\"><button class=\"btn\" onclick=\"saveNotes()\">Save notes</button><button class=\"btn\" onclick=\"clearNotes()\">Clear notes</button></div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>수업 전 종합 진술문 템플릿</h2>\n  <p>수업 전에 사용하십시오. 진술문은 간결하지만 구체적으로 작성합니다.</p>\n  <div class=\"callout\"><strong>템플릿:</strong> 이 본문에서 Fee & Stuart는 ______을 보게 한다. 왜냐하면 ______ 때문이다. Osborne은 ______을 보게 한다. 왜냐하면 ______ 때문이다. 둘을 함께 붙들 때, 이 본문은 나를 ______에서 ______로 이동하도록 형성한다.</div>\n  <label class=\"note-label\" for=\"noteA\">종합 진술문 초안</label>\n  <textarea id=\"noteA\" placeholder=\"여기에 종합 진술문을 작성하세요...\"></textarea>\n  <div class=\"btn-row\"><button class=\"btn\" onclick=\"saveNotes()\">노트 저장</button><button class=\"btn\" onclick=\"clearNotes()\">노트 지우기</button></div>\n</div>\n"}, {"id": "practice", "label_en": "Practice Moves", "label_ko": "실천 이동", "en": "\n<div class=\"card\">\n  <h2>Formation practice moves</h2>\n  <ol>\n    <li>Name the text's form before stating its message.</li>\n    <li>Name the community addressed before applying the text to a modern audience.</li>\n    <li>Name the lament before resolving it.</li>\n    <li>Name your readerly WHERE before producing application.</li>\n    <li>Name one communal practice that would change if proclamation and presence were held together.</li>\n  </ol>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>형성 실천 이동</h2>\n  <ol>\n    <li>메시지를 말하기 전에 본문의 형식을 먼저 명명한다.</li>\n    <li>오늘의 청중에게 적용하기 전에 본문이 향한 공동체를 먼저 명명한다.</li>\n    <li>해결하기 전에 탄식을 먼저 명명한다.</li>\n    <li>적용을 만들기 전에 나의 독자적 WHERE를 먼저 명명한다.</li>\n    <li>선포와 임재를 함께 붙든다면 달라져야 할 하나의 공동체 실천을 명명한다.</li>\n  </ol>\n</div>\n"}]}, {"id": "integration", "label_en": "Textbook Integration", "label_ko": "교재 통합", "subtabs": [{"id": "fee", "label_en": "Fee & Stuart", "label_ko": "Fee & Stuart", "en": "\n<div class=\"card\">\n  <h2>Fee & Stuart as instrument</h2>\n  <p>Fee & Stuart equips students to reconstruct how the Gospel text serves a community. Its tools include horizontal/vertical reading, two-level method, compositional strategy, and kingdom proclamation.</p>\n  <div class=\"callout\"><strong>Use this instrument when asking:</strong> What is this Gospel doing for the community that needed this text?</div>\n</div>\n", "ko": "\n<div class=\"card\">\n  <h2>악기로서의 Fee & Stuart</h2>\n  <p>Fee & Stuart는 학생들이 복음서 본문이 어떤 공동체를 섬기고 있는지 재구성하도록 돕습니다. 주요 도구는 수평/수직 읽기, 두 수준 방법, 구성 전략, 하나님 나라 선포입니다.</p>\n  <div class=\"callout\"><strong>이 악기를 사용할 질문:</strong> 이 복음서는 이 본문을 필요로 했던 공동체를 위해 무엇을 하고 있는가?</div>\n</div>\n"}, {"id": "osborne", "label_en": "Osborne", "label_ko": "Osborne", "en": "\n<div class=\"card\">\n  <h2>Osborne as instrument</h2>\n  <p>Os
